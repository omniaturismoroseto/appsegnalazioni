name: Bandiere automatiche

# Applica le bandiere LATO SERVER, indipendentemente da qualsiasi dispositivo:
#   • 09:00 ora di Roma  → tutte VERDI
#   • 19:00 ora di Roma  → tutte ROSSE
#
# I cron di GitHub girano in UTC. Per gestire automaticamente ora legale/solare,
# il workflow parte a più orari UTC candidati e applica il colore solo se, in
# quel momento, a Roma sono davvero le 09:00 o le 19:00.

on:
  schedule:
    - cron: "0 7 * * *"    # 09:00 Roma (ora legale, estate) — stagione balneare
    - cron: "0 8 * * *"    # 09:00 Roma (ora solare, inverno)
    - cron: "0 17 * * *"   # 19:00 Roma (ora legale, estate) — stagione balneare
    - cron: "0 18 * * *"   # 19:00 Roma (ora solare, inverno)
  workflow_dispatch:        # consente l'esecuzione MANUALE dal sito di GitHub (per i test)
    inputs:
      forza_colore:
        description: "Forza un colore (verde/rossa) ignorando l'orario — solo per test"
        required: false
        default: ""

jobs:
  bandiere:
    runs-on: ubuntu-latest
    steps:
      - name: Determina il colore in base all'ora di Roma
        run: |
          ORA=$(TZ=Europe/Rome date +%H)
          echo "Ora di Roma: ${ORA}:00"
          FORZA="${{ github.event.inputs.forza_colore }}"
          if [ -n "$FORZA" ]; then
            echo "Colore forzato manualmente: $FORZA"
            echo "COLORE=$FORZA" >> "$GITHUB_ENV"
          elif [ "$ORA" = "09" ]; then
            echo "COLORE=verde" >> "$GITHUB_ENV"
          elif [ "$ORA" = "19" ]; then
            echo "COLORE=rossa" >> "$GITHUB_ENV"
          else
            echo "Non è né le 09 né le 19 a Roma: nessuna azione."
            echo "COLORE=" >> "$GITHUB_ENV"
          fi

      - name: Applica le bandiere su Firebase
        if: env.COLORE != ''
        env:
          DB_URL: "https://app-segnalazioni-omnia-roseto-default-rtdb.europe-west1.firebasedatabase.app"
          # Se il database NON è scrivibile pubblicamente su /flags, imposta il secret
          # FIREBASE_DB_SECRET nelle impostazioni del repo (vedi GUIDA). Se le regole
          # consentono già la scrittura su /flags, il secret può restare vuoto.
          DB_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}
        run: |
          # Costruisci il payload con tutte le postazioni P.10–P.35 dello stesso colore
          JSON=$(python3 -c "import json; print(json.dumps({str(n): '${COLORE}' for n in range(10, 36)}))")
          echo "Applico: tutte le bandiere = ${COLORE}"

          # Compone l'URL con o senza autenticazione
          URL="${DB_URL}/flags.json"
          if [ -n "$DB_SECRET" ]; then
            URL="${URL}?auth=${DB_SECRET}"
          fi

          # PUT su Firebase, con verifica dell'esito
          HTTP=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X PUT -d "$JSON" "$URL")
          echo "Risposta HTTP: $HTTP"
          cat /tmp/resp.json || true
          if [ "$HTTP" != "200" ]; then
            echo "::error::Scrittura bandiere fallita (HTTP $HTTP). Controlla regole Firebase o secret."
            exit 1
          fi
          echo "✔ Bandiere aggiornate a ${COLORE}."
