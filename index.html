body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:15px}
:root{
  --red:#D62B1F;--navy:#1A3B8C;--bg:#fff;--bg2:#f5f5f5;--bg3:#ebebeb;
  --text:#1a1a1a;--text2:#666;--text3:#999;--border:#e0e0e0;--border2:#ccc;

  --success-bg:#f0fdf4;--success-text:#166534;
  --radius:8px;--radius-lg:12px;
  --verde:#27ae60;--gialla:#F5C800;--rossa:#e74c3c;

input,select,textarea,button{font-family:inherit;font-size:14px;outline:none}
input[type=text],input[type=password],select{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);display:block}
input:focus,select:focus,textarea:focus{border-color:var(--navy)}
textarea{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius);resize:vertical;background:var(--bg);color:var(--text);line-height:1.5}
button{cursor:pointer;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);color:var(--text);padding:7px 14px;transition:background .15s}
button:hover{background:var(--bg2)}
.btn-primary{background:var(--red);color:white;border-color:var(--red);font-weight:600;padding:12px;width:100%;font-size:15px}
.btn-primary:hover{background:#b82318}.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.back-btn{background:none;border:none;color:var(--text2);font-size:13px;padding:0;margin-bottom:20px;display:block}
.back-btn:hover{background:none;color:var(--text)}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:6px;margin-top:14px;letter-spacing:.03em}

// Firebase REST API - no SDK needed, works everywhere
var FB_URL="https://app-segnalazioni-omnia-roseto-default-rtdb.europe-west1.firebasedatabase.app";
var _fbListeners={};

// Storage ibrido: Firebase REST se online, localStorage se offline
var _fbOnline=false;
function _lsGet(k){try{return JSON.parse(localStorage.getItem("fb_"+k)||"null");}catch(e){return null;}}
function _lsSet(k,v){try{localStorage.setItem("fb_"+k,JSON.stringify(v));}catch(e){}}

function _fbFetch(path,method,body){
  var opts={method:method||"GET",headers:{"Content-Type":"application/json"}};
  if(body!==undefined)opts.body=JSON.stringify(body);
  return fetch(FB_URL+"/"+path+".json",opts)
    .then(function(r){if(!r.ok)throw new Error(r.status);_fbOnline=true;return r.json();});
}

var firebase={
  _db:{
    ref:function(path){
      return {
        _path:path,
        on:function(evt,cb){
          var self=this;
          var lsKey=self._path;
          // Avvia subito con dati locali
          var local=_lsGet(lsKey);
          if(local!==null)cb({val:function(){return local;}});
          // Poi tenta Firebase in background
          function poll(){
            _fbFetch(self._path)
              .then(function(data){
                _lsSet(lsKey,data);
                cb({val:function(){return data;}});
              })
              .catch(function(){/* silenzioso - usa localStorage */});
          }
          poll();
          setInterval(poll,5000);
        },
        push:function(data){
          var lsKey=this._path;
          // Salva sempre in locale
          var arr=_lsGet(lsKey)||{};
          var tempKey="local_"+Date.now();
          arr[tempKey]=data;
          _lsSet(lsKey,arr);
          // Tenta Firebase
          return _fbFetch(lsKey,"POST",data)
            .then(function(d){return {key:d.name};})
            .catch(function(){return {key:tempKey};});
        },
        set:function(data){
          _lsSet(this._path,data);
          return _fbFetch(this._path,"PUT",data).catch(function(){return null;});
        },
        update:function(data){
          var cur=_lsGet(this._path)||{};
          Object.assign(cur,data);
          _lsSet(this._path,cur);
          return _fbFetch(this._path,"PATCH",data).catch(function(){return null;});
        },
        remove:function(){
          _lsSet(this._path,null);
          return _fbFetch(this._path,"DELETE").catch(function(){return null;});
        },
        child:function(sub){return firebase._db.ref(this._path+"/"+sub);}
      };
    }
  },
  database:function(){return firebase._db;}
};

const METEO_POINT={lat:42.68657,lng:14.01179,name:"Roseto degli Abruzzi"};
function knotsFromKmh(v){return Math.round((Number(v||0))*0.539957);}
function degToCompass(deg){
  if(deg===undefined||deg===null||isNaN(deg)) return "-";
  const dirs=["N","NE","E","SE","S","SO","O","NO"];
  return dirs[Math.round((((deg%360)+360)%360)/45)%8];
}
function getRiskFromMeteo(m){
  if(!m) return {level:"n/d",flag:"verde",text:"Dati non disponibili"};
  const wave=Number(m.wave_height||0);
  const windKn=knotsFromKmh(m.wind_speed_10m||0);
  const gustKn=knotsFromKmh(m.wind_gusts_10m||0);
  const weatherCode=Number(m.weather_code||0);
  const thunder=[95,96,99].includes(weatherCode);
  if(thunder || wave>=1.2 || windKn>=22 || gustKn>=28) return {level:"alto",flag:"rossa",text:"Condizioni critiche o potenzialmente pericolose"};
  if(wave>=0.6 || windKn>=12 || gustKn>=18) return {level:"medio",flag:"gialla",text:"Mare mosso o vento sostenuto: attenzione"};
  return {level:"basso",flag:"verde",text:"Condizioni generalmente favorevoli"};
}
function fmtHour(iso){
  try{return new Date(iso).toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"});}catch(e){return "--:--";}
}

  meteoLoading=true; meteoError="";
  
  try{
    const forecastUrl = "https://api.open-meteo.com/v1/forecast?latitude="+METEO_POINT.lat+"&longitude="+METEO_POINT.lng+"&current=temperature_2m,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,precipitation&hourly=temperature_2m,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,precipitation&timezone=auto&forecast_days=3";
    const marineUrl = "https://marine-api.open-meteo.com/v1/marine?latitude="+METEO_POINT.lat+"&longitude="+METEO_POINT.lng+"&current=wave_height,wave_direction,wave_period,sea_surface_temperature&hourly=wave_height,wave_direction,wave_period,sea_surface_temperature&timezone=auto&forecast_days=2&cell_selection=sea";
    const [forecastRes, marineRes] = await Promise.all([fetch(forecastUrl), fetch(marineUrl)]);
    if(!forecastRes.ok) throw new Error("Forecast HTTP "+forecastRes.status);
    if(!marineRes.ok) throw new Error("Marine HTTP "+marineRes.status);
    const forecast = await forecastRes.json();
    const marine = await marineRes.json();
    const current = Object.assign({}, forecast.current||{}, marine.current||{});
    const times = (forecast.hourly&&forecast.hourly.time)||[];
    const marineTimes = (marine.hourly&&marine.hourly.time)||[];
    const hourly = [];
    const startIdx = times.findIndex(function(t){
      const d = new Date(t).getTime();
      return d >= now-60*60*1000;
    });
    const from = startIdx>=0 ? startIdx : 0;
    for(let i=from;i<Math.min(from+72,times.length);i++){
      const mt = marineTimes.indexOf(times[i]);
      hourly.push({
        time: times[i],
        weather_code: forecast.hourly.weather_code ? forecast.hourly.weather_code[i] : null,
        wind_speed_10m: forecast.hourly.wind_speed_10m ? forecast.hourly.wind_speed_10m[i] : null,
        wind_direction_10m: forecast.hourly.wind_direction_10m ? forecast.hourly.wind_direction_10m[i] : null,
        wind_gusts_10m: forecast.hourly.wind_gusts_10m ? forecast.hourly.wind_gusts_10m[i] : null,
        precipitation: forecast.hourly.precipitation ? forecast.hourly.precipitation[i] : null,
        wave_height: mt>=0 && marine.hourly.wave_height ? marine.hourly.wave_height[mt] : null,
        wave_direction: mt>=0 && marine.hourly.wave_direction ? marine.hourly.wave_direction[mt] : null,
        sea_surface_temperature: mt>=0 && marine.hourly.sea_surface_temperature ? marine.hourly.sea_surface_temperature[mt] : null
      });
    }
    meteoData = {
      current: current,
      hourly: hourly,
      risk: getRiskFromMeteo(current),
      updatedAt: new Date().toISOString()
    };
    meteoLastFetch = Date.now();
  }catch(err){
    meteoError = "Dati meteomarini non disponibili";
  }finally{
    meteoLoading=false;
    
  }
}

    else if(counts.gialla>=counts.verde) displayFlag="gialla";
    else displayFlag="verde";
    var tot=STATIONS.length;
    var pct=Math.round((counts[displayFlag]/tot)*100);

  hero.innerHTML=

    '<div class="mhero-flag" style="background:'+fc+'28;width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;z-index:1">'+fEmoji+'</div>'+
    '<div class="mhero-body" style="flex:1;z-index:1">'+
      '<div class="mhero-name" style="font-size:28px;font-weight:900;line-height:1;margin-bottom:4px;color:'+fc+'">'+String(risk.flag||"verde").toUpperCase()+'</div>'+
      '<div class="mhero-desc" style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:'+(displaySub?"6px":"4px")+'">'+risk.text+'</div>'+
      '<div class="mhero-time" style="font-size:11px;color:var(--text3);margin-bottom:'+( displaySub?"4px":"0")+'">Aggiornato: '+fmt(m.updatedAt)+'</div>'+
      (displaySub?'<div style="font-size:11px;color:#92400e;background:#fef3c7;border:1px solid #fde68a;border-radius:6px;padding:5px 8px;line-height:1.4">'+ displaySub+'</div>':'')
    +'</div>'+
    '<button id="meteo-refresh-btn" type="button" style="background:rgba(0,0,0,.06);border:none;border-radius:50%;width:36px;height:36px;font-size:17px;cursor:pointer;flex-shrink:0;z-index:1">↻</button>';
  page.appendChild(hero);
  hero.querySelector("#meteo-refresh-btn").addEventListener("click",function(){fetchMeteoMarine(true);});

  // Grid 6 dati
  const grid=document.createElement("div");grid.className="meteo-card";
  grid.innerHTML=
    '<div class="meteo-head"><h3>📊 Condizioni ora</h3></div>'+
    '<div class="mgrid3">'+
      '<div class="mstat"><div class="mi">💨</div><div class="mk">Vento</div><div class="mv">'+knotsFromKmh(cur.wind_speed_10m)+'<small style="font-size:11px;font-weight:500"> nd</small></div><div class="ms">'+degToCompass(cur.wind_direction_10m)+'</div></div>'+

  // Grafico barre onda + vento (Canvas)
  if(m.hourly&&m.hourly.length){

    chartCard.innerHTML='<div class="meteo-head"><h3>📈 Prossime 12 ore</h3><div style="display:flex;align-items:center;gap:12px;font-size:10px;color:var(--text3)"><span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#1697e6;margin-right:3px;vertical-align:middle"></span>Onda (m)</span><span><span style="display:inline-block;width:10px;height:3px;background:#F5C800;margin-right:3px;vertical-align:middle"></span>Vento (nd)</span></div></div>';

    canvas.height=110;
    canvas.style.cssText="width:100%;display:block";
    chartCard.appendChild(canvas);
    page.appendChild(chartCard);

    // Disegna grafico dopo mount
    setTimeout(function(){
      canvas.width=canvas.offsetWidth||canvas.parentElement.offsetWidth||320;
      const W=canvas.width, H=canvas.height;
      const ctx=canvas.getContext("2d");
      const hrs=m.hourly.slice(0,12);
      const PAD={t:10,r:8,b:28,l:36};
      const gW=W-PAD.l-PAD.r, gH=H-PAD.t-PAD.b;

      // Scala onda (barre)
      const waves=hrs.map(function(h){return h.wave_height!=null?Number(h.wave_height):0;});
      const winds=hrs.map(function(h){return knotsFromKmh(h.wind_speed_10m);});
      const maxWave=Math.max.apply(null,waves.concat([0.5]));
      const maxWind=Math.max.apply(null,winds.concat([5]));

      const barW=gW/hrs.length;

      // Griglia orizzontale
      ctx.strokeStyle="rgba(0,0,0,.06)";ctx.lineWidth=1;
      [0.25,0.5,0.75,1].forEach(function(f){
        const y=PAD.t+gH*(1-f);
        ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(PAD.l+gW,y);ctx.stroke();
      });

      // Barre onda
      hrs.forEach(function(h,i){
        const wv=h.wave_height!=null?Number(h.wave_height):0;
        const x=PAD.l+i*barW+barW*0.12;
        const bw=barW*0.52;
        const bh=(wv/maxWave)*gH;
        const y=PAD.t+gH-bh;
        // Colore barra per rischio
        const wnd=knotsFromKmh(h.wind_speed_10m);
        var col= (wv>2||wnd>25)?"#e74c3c":(wv>1||wnd>15)?"#F5C800":"#1697e6";
        ctx.fillStyle=col+"cc";
        // Arrotondamento sopra
        const r=Math.min(4,bw/2,bh);
        ctx.beginPath();
        ctx.moveTo(x+r,y);
        ctx.lineTo(x+bw-r,y);
        ctx.quadraticCurveTo(x+bw,y,x+bw,y+r);
        ctx.lineTo(x+bw,y+bh);
        ctx.lineTo(x,y+bh);
        ctx.lineTo(x,y+r);
        ctx.quadraticCurveTo(x,y,x+r,y);
        ctx.closePath();
        ctx.fill();
      });

      // Linea vento (sopra le barre)
      ctx.strokeStyle="#F5C800";ctx.lineWidth=2.5;ctx.lineJoin="round";
      ctx.beginPath();
      hrs.forEach(function(h,i){
        const wnd=knotsFromKmh(h.wind_speed_10m);
        const cx=PAD.l+i*barW+barW*0.5;
        const cy=PAD.t+gH-(wnd/maxWind)*gH*0.9;
        if(i===0) ctx.moveTo(cx,cy); else ctx.lineTo(cx,cy);
      });
      ctx.stroke();
      // Punti linea vento
      hrs.forEach(function(h,i){
        const wnd=knotsFromKmh(h.wind_speed_10m);
        const cx=PAD.l+i*barW+barW*0.5;
        const cy=PAD.t+gH-(wnd/maxWind)*gH*0.9;
        ctx.fillStyle="#F5C800";
        ctx.beginPath();ctx.arc(cx,cy,3,0,Math.PI*2);ctx.fill();
      });

      // Asse Y onda (sinistra)
      ctx.fillStyle="rgba(0,0,0,.35)";ctx.font="10px sans-serif";ctx.textAlign="right";
      [0,maxWave*0.5,maxWave].forEach(function(v){
        const y=PAD.t+gH-(v/maxWave)*gH;
        ctx.fillText(v.toFixed(1)+"m",PAD.l-4,y+3);
      });

      // Etichette ore (basso)
      ctx.fillStyle="rgba(0,0,0,.4)";ctx.textAlign="center";ctx.font="9px sans-serif";
      hrs.forEach(function(h,i){
        if(i%2!==0)return; // ogni 2 ore
        const cx=PAD.l+i*barW+barW*0.5;
        ctx.fillText(fmtHour(h.time),cx,H-6);
      });
    },60);
  }
}

function resizeImg(file,cb){

function haversine(lat1,lng1,lat2,lng2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function findNearest(lat,lng){
  let best=null,bestDist=Infinity;
  STATIONS.forEach(s=>{const d=haversine(lat,lng,s.lat,s.lng);if(d<bestDist){bestDist=d;best=s;}});
  return{station:best,dist:Math.round(bestDist)};
}
function findNearestDAE(lat,lng){
  var best=null,bestDist=Infinity;
  DAE_POINTS.forEach(function(d){
    var dist=haversine(lat,lng,d.lat,d.lng);
    if(dist<bestDist){bestDist=dist;best=d;}
  });
  return{dae:best,dist:Math.round(bestDist)};
}

      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;g.gain.value=0.25;
      o.start(ctx.currentTime+i*0.22);o.stop(ctx.currentTime+i*0.22+0.15);

// GPS
function requestGPS(){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(pos=>{
    const{latitude:lat,longitude:lng}=pos.coords;
    const{station,dist}=findNearest(lat,lng);
    nearestStation=station;nearestDist=dist;
    var daeResult=findNearestDAE(lat,lng);
    nearestDAE=daeResult.dae;nearestDAEDist=daeResult.dist;
    if(mapObj){
      if(userMarker){try{userMarker.remove();}catch(e){}}
      const icon=L.divIcon({className:"",html:'<div style="width:16px;height:16px;border-radius:50%;background:#1d4ed8;border:3px solid white;box-shadow:0 0 0 4px rgba(29,78,216,.3)"></div>',iconSize:[16,16],iconAnchor:[8,8]});
      userMarker=L.marker([lat,lng],{icon}).addTo(mapObj).bindPopup('<b>Sei qui</b>');
      const bounds=L.latLngBounds([[lat,lng],[station.lat,station.lng]]);
      mapObj.fitBounds(bounds,{padding:[50,50],maxZoom:16});
    }
    if(currentScreen==="home"||currentScreen==="forecast")renderPage();
  },function(e){
    // GPS non disponibile - mostra strip cliccabile
    nearestStation=null;
    if(currentScreen==="home"||currentScreen==="forecast")renderPage();
  },{enableHighAccuracy:true,timeout:15000,maximumAge:0});
}

}

// MAPPA
function initMap(){
  var el=document.getElementById("main-map");
  if(!el)return;
  if(mapObj){ensureLocamareMarker();refreshMarkers();mapObj.invalidateSize(true);return;}
  el.style.height="280px";el.style.width="100%";
  mapObj=L.map(el,{zoomControl:true,preferCanvas:true,updateWhenIdle:true,tap:true}).setView([42.686,14.010],13);
  L.tileLayer(
    "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
    {
      attribution:"Tiles © Esri",
      maxZoom:20,
      updateWhenIdle:true,
      keepBuffer:3
    }
  ).addTo(mapObj);
  ensureLocamareMarker();
  addCCMarker();
  addComuneMarker();
  addDAEMarkers();
  refreshMarkers();
  mapObj.whenReady(function(){
    [50,250,700].forEach(function(t){setTimeout(function(){if(mapObj)mapObj.invalidateSize(true);},t);});
  });
  mapObj.on("load",function(){setTimeout(function(){if(mapObj)mapObj.invalidateSize(true);},150);});
}
function getMarkerColor(s){
  const open=Object.values(reportsData).filter(r=>r.status==="aperta");
  const zl=`P.${s.num} \u2013 ${s.name}`;
  const zr=open.filter(r=>r.zone===zl);
  if(zr.some(r=>r.type==="emergenza"))return{bg:ALERT_COLORS.emergenza,ring:true};
  if(zr.some(r=>r.type==="pericolo"))return{bg:ALERT_COLORS.pericolo,ring:true};
  return{bg:FLAG_COLORS[flagsData[s.num]||"verde"],ring:false,flag:flagsData[s.num]||"verde"};
}
function refreshMarkers(){
  if(!mapObj)return;
  mapMarkers.forEach(m=>{try{m.remove();}catch(e){}});
  mapMarkers=[];
  const open=Object.values(reportsData).filter(r=>r.status==="aperta");
  STATIONS.forEach(s=>{
    const zl=`P.${s.num} \u2013 ${s.name}`;
    const zr=open.filter(r=>r.zone===zl);
    const mc=getMarkerColor(s);
    const isNearest=nearestStation&&nearestStation.num===s.num;
    const shadow=mc.ring?`box-shadow:0 0 0 3px ${mc.bg},0 0 0 5px white;`:`box-shadow:0 1px 4px rgba(0,0,0,.4);`;
    const nearRing=isNearest?`outline:3px solid #1d4ed8;outline-offset:2px;`:"";
    const icon=L.divIcon({className:"",
      html:`<div style="width:26px;height:26px;border-radius:50%;background:${mc.bg};border:2.5px solid white;color:white;font-size:8.5px;font-weight:700;line-height:21px;text-align:center;${shadow}${nearRing}">${s.num}</div>`,
      iconSize:[26,26],iconAnchor:[13,13]});
    // Popup con info postazione e distanza
    (function(station, zoneLabel, alerts, markerColor){
      var m=L.marker([station.lat,station.lng],{icon}).addTo(mapObj);
      m.on("click",function(){
        // Cerca posizione utente dal userMarker
        var userPos=null;
        if(userMarker){try{userPos=userMarker.getLatLng();}catch(e){}}
        var distStr="";
        if(userPos){
          var dm=Math.round(haversine(userPos.lat,userPos.lng,station.lat,station.lng));
          distStr="<br><span style=\"color:#555;font-size:12px\">\uD83D\uDCCD "+fmtDist(dm)+" da te</span>";
        } else if(nearestStation&&nearestStation.num===station.num&&nearestDist){
          distStr="<br><span style=\"color:#555;font-size:12px\">\uD83D\uDCCD "+fmtDist(nearestDist)+" da te</span>";
        }
        // Colore bandiera
        var flagName=flagsData[station.num]||"verde";
        var flagCol=FLAG_COLORS[flagName];
        var flagStr="<br><span style=\"font-size:12px\">Bandiera <span style=\"font-weight:700;color:"+flagCol+"\">"+flagName.toUpperCase()+"</span></span>";
        // Alert aperti
        var alertStr=alerts.length>0?"<br><span style=\"color:"+markerColor+";font-size:12px\">"+alerts.length+" segnalaz. aperte</span>":"";
        var popup=L.popup({maxWidth:220})
          .setContent(
            "<div style=\"font-family:sans-serif;padding:2px\">"
            +"<b style=\"font-size:14px\">P."+station.num+" \u2013 "+station.name+"</b>"
            +distStr+flagStr+alertStr
            +"<br><button onclick=\"window._segnalaPostazione('"+zoneLabel+"')\" "
            +"style=\"margin-top:8px;width:100%;padding:7px;background:#D62B1F;color:white;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer\">"
            +"\uD83D\uDEA8 Segnala qui</button>"
            +"</div>"
          );
        m.bindPopup(popup).openPopup();
      });
      mapMarkers.push(m);
    })(s, zl, zr, mc.bg);
  });
}

// RENDER
function render(screen){
  currentScreen=screen;
  if(!suppressHistory){
    try{
      if(!history.state || history.state.screen!==screen){
        history.pushState({screen:screen},"","");
      }
    }catch(e){}
  }
  renderHeader();
  const mapEl=document.getElementById("main-map");
  const showMap=["home","dashboard"].includes(screen);
  mapEl.style.display=showMap?"block":"none";
  document.getElementById("map-legend").style.display=showMap?"flex":"none";
  if(showMap){
    if(!mapObj){initMap();}
    else{refreshMarkers();[200,600].forEach(function(t){setTimeout(function(){if(mapObj)mapObj.invalidateSize(true);},t);});}
    renderMapLegend();
    if(!nearestStation)requestGPS();
  } else if(screen==="forecast"){
    // Richiedi GPS anche nella pagina meteo per la bandiera della postazione
    if(!nearestStation)requestGPS();
  }
  renderPage();
}
function renderPage(){
  const page=document.getElementById("page");page.innerHTML="";
  if(currentScreen==="home")renderHome(page);
  else if(currentScreen==="login")renderLogin(page);
  else if(currentScreen==="submit")renderSubmit(page);
  else if(currentScreen==="done")renderDone(page);
  else if(currentScreen==="forecast")renderForecastPage(page);
  else if(currentScreen==="dashboard"){if(currentRole!=="operator"){render("login");return;}renderDashboard(page);}
}

    // Funzione sky icon da weather_code WMO

      var night=hr<6||hr>=21;
      if(code==null||code<=1) return night?"🌙":"☀️";
      if(code<=2) return night?"🌑":"🌤️";
      if(code<=3) return "⛅";
      if(code<=48) return "🌫️";
      if(code<=55) return "🌦️";
      if(code<=65) return "🌧️";
      if(code<=75) return "❄️";
      if(code<=82) return "🌦️";
      if(code<=86) return "🌨️";
      return "⛈️";
    }
    // Raggruppa per giorno e fascia oraria
    var dayMap={};
    meteoData.hourly.forEach(function(h){
      var d=new Date(h.time);
      var dk=d.toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"});
      var hr=d.getHours();
      var slot=hr>=6&&hr<12?"mattina":hr>=12&&hr<18?"pomeriggio":hr>=18&&hr<24?"sera":"notte";
      if(!dayMap[dk])dayMap[dk]={mattina:[],pomeriggio:[],sera:[],notte:[]};

    function avgF(arr,field){
      var v=arr.map(function(h){return h[field];}).filter(function(x){return x!=null;});

// SUBMIT
function renderSubmit(page){
  let type="pericolo",sub="",zone=ZONES[0],notes="",author="",phone="",photo=null;
  const wrap=document.createElement("div");wrap.className="form-wrap";
  const back=document.createElement("button");back.className="back-btn";back.textContent="\u2190 Indietro";
  back.addEventListener("click",()=>render(currentRole==="operator"?"dashboard":"home"));wrap.appendChild(back);
  const h=document.createElement("h2");h.style.cssText="font-size:18px;font-weight:600;margin-bottom:20px";h.textContent="Nuova segnalazione";wrap.appendChild(h);
  const lbT=document.createElement("label");lbT.textContent="Tipo segnalazione";wrap.appendChild(lbT);
  const tg=document.createElement("div");tg.className="type-grid";
  const typeBtns={};
  function setType(k){
    type=k;sub="";
    subSel.innerHTML=`<option value="">Seleziona...</option>`+TYPES[k].sub.map(s=>`<option value="${s}">${s}</option>`).join("");
    const map={emergenza:"danger",pericolo:"warning"};
    Object.entries(typeBtns).forEach(([bk,bb])=>{
      const c=map[bk];bb.style.background=bk===k?`var(--${c}-bg)`:"";
      bb.style.color=bk===k?`var(--${c}-text)`:"var(--text2)";
      bb.style.borderColor=bk===k?`var(--${c}-border)`:"var(--border2)";
      bb.style.fontWeight=bk===k?"600":"400";
    });
  }
  Object.entries(TYPES).forEach(([k,v])=>{
    const btn=document.createElement("button");btn.className="type-btn";btn.textContent=v.label;
    btn.addEventListener("click",()=>setType(k));typeBtns[k]=btn;tg.appendChild(btn);
  });
  wrap.appendChild(tg);
  const lbS=document.createElement("label");lbS.textContent="Dettaglio";wrap.appendChild(lbS);
  const subSel=document.createElement("select");wrap.appendChild(subSel);
  subSel.addEventListener("change",()=>sub=subSel.value);setType("pericolo");
  const lbZ=document.createElement("label");lbZ.textContent="Postazione";wrap.appendChild(lbZ);
  const zoneSel=document.createElement("select");
  ZONES.forEach(z=>{const o=document.createElement("option");o.value=z;o.textContent=z;zoneSel.appendChild(o);});
  const presel=activeStation||(nearestStation?`P.${nearestStation.num} \u2013 ${nearestStation.name}`:null);
  if(presel&&ZONES.includes(presel))zoneSel.value=presel;
  zone=zoneSel.value;zoneSel.addEventListener("change",()=>zone=zoneSel.value);wrap.appendChild(zoneSel);
  if(nearestStation&&!activeStation){
    const hint=document.createElement("p");hint.style.cssText="font-size:11px;color:var(--info-text);margin-top:4px";
    hint.textContent=`\uD83D\uDCCD Postazione pi\u00f9 vicina preselezionata (${fmtDist(nearestDist)})`;wrap.appendChild(hint);
  }
  const lbN=document.createElement("label");lbN.innerHTML="Descrizione <span style=\"font-size:11px;color:var(--text3);font-weight:400\">(opzionale)</span>";wrap.appendChild(lbN);
  const notesEl=document.createElement("textarea");notesEl.placeholder="Aggiungi dettagli (opzionale)...";notesEl.rows=3;
  notesEl.addEventListener("input",()=>notes=notesEl.value);wrap.appendChild(notesEl);
  const lbF=document.createElement("label");lbF.textContent="Foto (opzionale)";wrap.appendChild(lbF);
  const fileInp=document.createElement("input");fileInp.type="file";fileInp.accept="image/*";fileInp.setAttribute("capture","environment");
  fileInp.style.cssText="font-size:12px;color:var(--text2);width:100%";
  const photoWrap=document.createElement("div");
  fileInp.addEventListener("change",()=>{
    const f=fileInp.files[0];if(!f)return;
    resizeImg(f,b=>{
      photo=b;photoWrap.innerHTML="";
      const img=document.createElement("img");img.src=b;img.className="photo-preview";
      const rm=document.createElement("button");rm.className="photo-remove";rm.textContent="\u2715 Rimuovi";
      rm.addEventListener("click",()=>{photo=null;photoWrap.innerHTML="";fileInp.value="";});
      photoWrap.appendChild(img);photoWrap.appendChild(rm);
    });
  });
  wrap.appendChild(fileInp);wrap.appendChild(photoWrap);
  const lbA=document.createElement("label");lbA.textContent="Nome (opzionale)";wrap.appendChild(lbA);
  const authorEl=document.createElement("input");authorEl.type="text";
  authorEl.placeholder=currentRole==="operator"?"Operatore":"Nome";
  authorEl.addEventListener("input",()=>author=authorEl.value);wrap.appendChild(authorEl);
  // Telefono obbligatorio (solo pubblico)
  if(currentRole!=="operator"){
    const lbP=document.createElement("label");
    lbP.innerHTML="Telefono <span style=\"color:var(--red)\">*</span> <span style=\"font-size:11px;color:var(--text3);font-weight:400\">(obbligatorio)</span>";
    wrap.appendChild(lbP);
    const phoneEl=document.createElement("input");phoneEl.type="tel";
    phoneEl.placeholder="Es. 3281234567";phoneEl.id="segnalazione-phone";
    phoneEl.style.cssText="border-color:var(--border2)";
    phoneEl.addEventListener("input",function(){
      phone=phoneEl.value.trim();
      phoneEl.style.borderColor=phone.length>=9?"var(--verde)":"var(--border2)";
    });
    wrap.appendChild(phoneEl);
    const phoneHint=document.createElement("p");
    phoneHint.style.cssText="font-size:11px;color:var(--text3);margin-top:4px";
    phoneHint.textContent="Il numero di telefono sarà utilizzato esclusivamente per eventuali comunicazioni relative alla segnalazione inviata.";
    wrap.appendChild(phoneHint);
  }
  const privacyWrap=document.createElement("div");
  privacyWrap.style.cssText="margin-top:16px;padding:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg2)";
  privacyWrap.innerHTML=
    '<p style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px">Informativa privacy</p>'
    +'<p style="font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:8px">Ai sensi del Regolamento UE 2016/679 (GDPR), i dati personali eventualmente forniti tramite questo servizio, incluso il numero di telefono, saranno trattati da Omnia Servizi al Turismo SRLS esclusivamente per la gestione della segnalazione, eventuali verifiche e ricontatto dell’utente, se necessario.</p>'
    +'<p style="font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:8px">I dati saranno utilizzati solo dal personale incaricato del servizio e conservati per il tempo strettamente necessario alla gestione della segnalazione.</p>'
    +'<label style="display:flex;gap:8px;align-items:flex-start;font-size:12px;color:var(--text);margin:0"><input type="checkbox" id="privacyCheck" style="margin-top:2px;flex-shrink:0"> <span>Ho letto l’informativa privacy e acconsento al trattamento dei dati personali per la gestione della segnalazione.</span></label>';
  wrap.appendChild(privacyWrap);

  const emergencyNote=document.createElement("p");
  emergencyNote.style.cssText="font-size:11px;color:var(--danger-text);text-align:center;margin-top:10px";
  emergencyNote.textContent="Per emergenze reali contattare immediatamente il 112 o il servizio di salvataggio più vicino.";
  wrap.appendChild(emergencyNote);

  const submitBtn=document.createElement("button");submitBtn.className="btn-primary";submitBtn.style.marginTop="18px";submitBtn.textContent="Invia segnalazione";
  submitBtn.addEventListener("click",()=>{
    sub=subSel.value;notes=notesEl.value;zone=zoneSel.value;author=authorEl.value;
    var phoneEl2=document.getElementById("segnalazione-phone");
    if(phoneEl2)phone=phoneEl2.value.trim();
    if(!sub){alert("Seleziona il tipo di segnalazione.");return;}
    if(currentRole!=="operator"&&phone.length<9){
      if(phoneEl2){phoneEl2.style.borderColor="var(--red)";phoneEl2.focus();}
      alert("Inserisci un numero di telefono valido per procedere.");return;
    }
    var privacyCheck=document.getElementById("privacyCheck");
    if(privacyCheck&&!privacyCheck.checked){
      alert("Devi leggere e accettare l’informativa privacy per procedere.");return;
    }
    submitBtn.disabled=true;submitBtn.textContent="Invio...";
    const r={id:Date.now(),type,sub,zone,notes,author,phone:phone||null,role:currentRole||"public",ts:new Date().toISOString(),status:"aperta",photo:photo||null};
    addReport(r).then(()=>{sendWANotify(r);render("done");})
    .catch(e=>{submitBtn.disabled=false;submitBtn.textContent="Invia segnalazione";alert("Errore: "+e.message);});
  });
  wrap.appendChild(submitBtn);
  const wanote=document.createElement("p");wanote.style.cssText="font-size:11px;color:var(--text3);text-align:center;margin-top:10px";
  wanote.textContent="\uD83D\uDCAC Dopo l'invio si aprir\u00e0 WhatsApp per notificare gli operatori";
  wrap.appendChild(wanote);page.appendChild(wrap);
}

// DASHBOARD
function renderDashboard(page){
  const reports=getReports(),open=reports.filter(r=>r.status==="aperta");
  const tb=document.createElement("div");tb.className="dash-toolbar";
  const ti=document.createElement("div");
  const sd=fbReady?`<span class="sync-dot" title="Sync attivo"></span>`:`<span class="sync-dot off" title="Connessione..."></span>`;
  ti.innerHTML=`<h1 style="font-size:16px;font-weight:600;margin-bottom:2px">Dashboard Operatori ${sd}</h1><p style="font-size:11px;color:var(--text2)">Roseto degli Abruzzi &middot; P.10 \u2013 P.35</p>`;
  tb.appendChild(ti);
  const ac=document.createElement("div");ac.className="dash-actions";
  const newBtn=document.createElement("button");newBtn.className="btn-primary";newBtn.style.cssText="width:auto;font-size:12px;padding:6px 14px";newBtn.textContent="+ Segnala";
  newBtn.addEventListener("click",()=>render("submit"));ac.appendChild(newBtn);tb.appendChild(ac);page.appendChild(tb);
  const sg=document.createElement("div");sg.className="stats-grid";
  [{label:"APERTE",value:open.length,color:""},{label:"EMERGENZE",value:open.filter(r=>r.type==="emergenza").length,color:"var(--danger-text)"},
   {label:"PERICOLI",value:open.filter(r=>r.type==="pericolo").length,color:"var(--warning-text)"}]
  .forEach(s=>{const sc=document.createElement("div");sc.className="stat-card";sc.innerHTML=`<p class="stat-label">${s.label}</p><p class="stat-value"${s.color?` style="color:${s.color}"`:""}>${s.value}</p>`;sg.appendChild(sc);});
  page.appendChild(sg);
  const tabBar=document.createElement("div");tabBar.className="tab-bar";
  [["segnalazioni","Segnalazioni"],["bandiere","Bandiere"]].forEach(([k,l])=>{
    const btn=document.createElement("button");btn.className="tab-btn"+(activeDashTab===k?" active":"");btn.textContent=l;
    btn.addEventListener("click",()=>{activeDashTab=k;renderPage();});tabBar.appendChild(btn);
  });
  page.appendChild(tabBar);
  if(activeDashTab==="bandiere"){renderBandiere(page);return;}
  if(activeStation){
    const bar=document.createElement("div");bar.className="zone-filter-bar";
    bar.innerHTML=`<span style="font-size:12px;flex:1;color:var(--text2)">Filtro: ${activeStation}</span>`;
    const clr=document.createElement("button");clr.style.cssText="font-size:11px;padding:2px 8px;color:var(--danger-text);background:var(--danger-bg);border-color:transparent";clr.textContent="\u2715 rimuovi";
    clr.addEventListener("click",()=>{activeStation=null;renderPage();});bar.appendChild(clr);page.appendChild(bar);
  }
  const ft=document.createElement("div");ft.className="filters";
  [["aperte","Aperte"],["emergenza","Emergenze"],["pericolo","Pericoli"],["tutte","Tutte"]].forEach(([k,l])=>{
    const b=document.createElement("button");b.className="filter-btn"+(activeFilter===k?" active":"");b.textContent=l;
    b.addEventListener("click",()=>{activeFilter=k;renderPage();});ft.appendChild(b);
  });
  page.appendChild(ft);
  let filtered=activeFilter==="tutte"?reports:activeFilter==="aperte"?open:reports.filter(r=>r.type===activeFilter);
  if(activeStation)filtered=filtered.filter(r=>r.zone===activeStation);
  if(!filtered.length){const em=document.createElement("p");em.className="empty";em.textContent="Nessuna segnalazione";page.appendChild(em);return;}
  const list=document.createElement("div");list.className="reports-list";
  filtered.forEach(r=>{
    const res=r.status==="risolta";
    const card=document.createElement("div");card.className=`report-card ${res?"resolved":r.type}`;
    const top=document.createElement("div");top.className="report-top";
    const body=document.createElement("div");body.className="report-body";
    const hr=document.createElement("div");hr.style.cssText="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px";
    const bdg=document.createElement("span");bdg.className=`badge badge-${r.type}`;bdg.textContent=TYPES[r.type].label.toUpperCase();hr.appendChild(bdg);
    const subEl=document.createElement("span");subEl.style.cssText="font-size:13px;font-weight:600";subEl.textContent=r.sub;hr.appendChild(subEl);
    if(res){const t=document.createElement("span");t.className="tag-resolved";t.textContent="\u2713 risolta";hr.appendChild(t);}
    if(r.role==="public"){const t=document.createElement("span");t.className="tag-public";t.textContent="pubblico";hr.appendChild(t);}
    body.appendChild(hr);
    const nt=document.createElement("p");nt.style.cssText="font-size:13px;line-height:1.5;margin-bottom:4px";nt.textContent=r.notes;body.appendChild(nt);
    if(r.photo){const img=document.createElement("img");img.src=r.photo;img.style.cssText="margin:4px 0;max-width:100%;height:90px;object-fit:cover;border-radius:var(--radius);border:1px solid var(--border);display:block";body.appendChild(img);}
    const mt=document.createElement("p");mt.className="report-meta";mt.textContent=`${r.zone} \u00b7 ${fmt(r.ts)}${r.author?" \u00b7 "+r.author:""}${r.phone?" \u00b7 \uD83D\uDCDE "+r.phone:""}`;body.appendChild(mt);
    top.appendChild(body);
    const acts=document.createElement("div");acts.className="report-actions";
    const wa=document.createElement("button");wa.className="action-btn wa";wa.textContent="WA";
    wa.addEventListener("click",()=>{
      const em={emergenza:"\uD83D\uDEA8",pericolo:"\u26A0\uFE0F"};
      const txt=`${em[r.type]} *${TYPES[r.type].label.toUpperCase()}* \u2014 ${r.sub}\n\uD83D\uDCCD ${r.zone}\n${r.notes}${r.author?"\n\uD83D\uDC64 "+r.author:""}${r.phone?"\n\uD83D\uDCDE "+r.phone:""}\n\uD83D\uDD50 ${fmt(r.ts)}\n\n\u2014 Omnia Adriatic Safety Lifeguard`;
      window.open(`https://wa.me/${WA_NOTIFY}?text=${encodeURIComponent(txt)}`,"_blank");
    });acts.appendChild(wa);
    if(!res){
      const rv=document.createElement("button");rv.className="action-btn resolve";rv.textContent="\u2713";
      rv.addEventListener("click",()=>resolveReport(r._key).then(()=>refreshMarkers()));acts.appendChild(rv);
    }
    const dl=document.createElement("button");dl.className="action-btn del";dl.textContent="\u2715";
    dl.addEventListener("click",()=>{if(confirm("Eliminare questa segnalazione?")){deleteReport(r._key).then(()=>refreshMarkers());}});
    acts.appendChild(dl);top.appendChild(acts);card.appendChild(top);list.appendChild(card);
  });
  page.appendChild(list);
}

function renderBandiere(page){
  const flags=getFlags();
  const panel=document.createElement("div");panel.className="bandiere-panel";
  const hdr=document.createElement("div");hdr.className="bandiere-header";
  const title=document.createElement("h3");title.textContent="Bandiere postazioni";hdr.appendChild(title);
  const bulk=document.createElement("div");bulk.className="bulk-controls";
  const bulkLbl=document.createElement("label");bulkLbl.textContent="Tutte:";bulk.appendChild(bulkLbl);
  const bulkSel=document.createElement("select");bulkSel.style.cssText="width:auto;padding:5px 8px;font-size:12px";
  [["verde","\uD83D\uDFE2 Verde"],["gialla","\uD83D\uDFE1 Gialla"],["rossa","\uD83D\uDD34 Rossa"]].forEach(([v,l])=>{
    const o=document.createElement("option");o.value=v;o.textContent=l;bulkSel.appendChild(o);
  });
  bulk.appendChild(bulkSel);
  const bulkBtn=document.createElement("button");bulkBtn.className="bulk-btn";bulkBtn.textContent="Applica a tutte";
  bulkBtn.addEventListener("click",()=>{
    const val=bulkSel.value,f={};STATIONS.forEach(s=>f[s.num]=val);saveFlags(f);
  });
  bulk.appendChild(bulkBtn);hdr.appendChild(bulk);panel.appendChild(hdr);
  STATIONS.forEach(s=>{
    const row=document.createElement("div");row.className="station-row";
    const dot=document.createElement("div");dot.className="station-flag-dot";dot.style.background=FLAG_COLORS[flags[s.num]||"verde"];row.appendChild(dot);
    const nm=document.createElement("div");nm.className="station-name";
    nm.innerHTML=`${s.name} <span class="station-num">P.${s.num}</span>`;row.appendChild(nm);
    const sel=document.createElement("select");sel.className="flag-select";
    [["verde","\uD83D\uDFE2 Verde"],["gialla","\uD83D\uDFE1 Gialla"],["rossa","\uD83D\uDD34 Rossa"]].forEach(([v,l])=>{
      const o=document.createElement("option");o.value=v;o.textContent=l;
      if((flags[s.num]||"verde")===v)o.selected=true;sel.appendChild(o);
    });
    sel.addEventListener("change",()=>{dot.style.background=FLAG_COLORS[sel.value];setFlag(s.num,sel.value);});
    row.appendChild(sel);panel.appendChild(row);
  });
  page.appendChild(panel);
}
