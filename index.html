<head>

<link rel="icon" type="image/png" sizes="512x512" href="/appsegnalazioni/icon-512-fixed.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="/appsegnalazioni/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/appsegnalazioni/favicon-16.png">
<link rel="shortcut icon" href="/appsegnalazioni/favicon.ico">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:15px}
:root{
  --red:#D62B1F;--navy:#1A3B8C;--bg:#fff;--bg2:#f5f5f5;--bg3:#ebebeb;
  --text:#1a1a1a;--text2:#666;--text3:#999;--border:#e0e0e0;--border2:#ccc;
  --danger-bg:#fef2f2;--danger-text:#c0392b;--danger-border:#f5c6cb;
  --warning-bg:#fffbeb;--warning-text:#b45309;--warning-border:#fcd34d;
  --info-bg:#eff6ff;--info-text:#1d4ed8;--info-border:#bfdbfe;
  --success-bg:#f0fdf4;--success-text:#166534;
  --radius:8px;--radius-lg:12px;
  --verde:#27ae60;--gialla:#F5C800;--rossa:#e74c3c;
}
input,select,textarea,button{font-family:inherit;font-size:14px;outline:none}
.leaflet-control-attribution{display:none!important}
input[type=text],input[type=password],select{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);display:block}
input:focus,select:focus,textarea:focus{border-color:var(--navy)}
textarea{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius);resize:vertical;background:var(--bg);color:var(--text);line-height:1.5}
button{cursor:pointer;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);color:var(--text);padding:7px 14px;transition:background .15s}
button:hover{background:var(--bg2)}
.btn-primary{background:var(--red);color:white;border-color:var(--red);font-weight:600;padding:12px;width:100%;font-size:15px}
.btn-primary:hover{background:#b82318}.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.back-btn{background:none;border:none;color:var(--text2);font-size:13px;padding:0;margin-bottom:20px;display:block}
.back-btn:hover{background:none;color:var(--text)}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:6px;margin-top:14px;letter-spacing:.03em}
label:first-child{margin-top:0}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--radius);letter-spacing:.04em;display:inline-block}
.badge-emergenza{background:var(--danger-bg);color:var(--danger-text)}
.badge-pericolo{background:var(--warning-bg);color:var(--warning-text)}
.filter-btn{font-size:12px;padding:4px 12px;border-radius:20px}
.filter-btn.active{background:var(--bg3);border-color:var(--border2);font-weight:600}
.type-btn{padding:10px 4px;border-radius:var(--radius);font-size:12px;text-align:center;transition:all .15s}
.header{background:var(--red);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:1000}
.header-logo{display:flex;align-items:center;flex:1;cursor:pointer;min-width:0}
.header-btns{display:flex;align-items:center;gap:6px;flex-shrink:0}
.hbtn-icon{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.18);border:none;display:flex;align-items:center;justify-content:center;font-size:15px;text-decoration:none;color:white;cursor:pointer;flex-shrink:0}
.hbtn-icon:hover{background:rgba(255,255,255,.3)}
.hbtn-op{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);color:white;font-size:17px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.hbtn-op:hover{background:rgba(255,255,255,.3)}
.notif-badge{position:absolute;top:-4px;right:-4px;background:#F5C800;color:white;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--red)}
.hbtn-wrap{position:relative}
#main-map{height:38vh;min-height:260px;max-height:420px;width:100%;display:block;z-index:1;background:#e8e8e8}
@media(min-width:600px){#main-map{height:50vh;max-height:600px}}
@media(min-width:900px){#main-map{height:60vh;max-height:800px}}
@media(min-width:1200px){#main-map{height:65vh;max-height:900px}}
.leaflet-popup-content-wrapper{border-radius:12px!important;box-shadow:0 4px 20px rgba(0,0,0,.3)!important;max-height:240px!important;overflow:hidden!important;display:flex!important;flex-direction:column!important}.leaflet-popup-content{margin:0!important;padding:12px 14px!important;overflow-y:auto!important;-webkit-overflow-scrolling:touch!important;max-height:180px!important;flex:1!important}.leaflet-popup-content::-webkit-scrollbar{width:3px}.leaflet-popup-content::-webkit-scrollbar-thumb{background:rgba(0,0,0,.2);border-radius:2px}.leaflet-popup-close-button{font-size:22px!important;padding:6px 10px!important;top:2px!important;right:2px!important;z-index:1!important}.map-legend{display:flex;gap:11px;flex-wrap:wrap;padding:6px 14px;background:var(--bg);border-bottom:1px solid var(--border);font-size:11px;color:var(--text2);align-items:center}
.ldot{width:10px;height:10px;border-radius:50%;flex-shrink:0;display:inline-block;margin-right:3px;vertical-align:middle}
#content{padding:16px}.page-inner{max-width:660px;margin:0 auto}
.nearest-card{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--info-bg);border:1px solid var(--info-border);border-radius:var(--radius-lg);margin-bottom:14px}
.nearest-flag{width:18px;height:18px;border-radius:50%;flex-shrink:0}
.nearest-info{flex:1;min-width:0}
.nearest-info strong{font-size:14px;font-weight:600;color:var(--info-text);display:block}
.nearest-info span{font-size:12px;color:var(--text2)}
.nearest-btn{font-size:12px;padding:5px 11px;color:var(--info-text);background:white;border-color:var(--info-border);white-space:nowrap;flex-shrink:0}
.home-btns{display:grid;gap:10px;margin-bottom:18px}
.home-btn{padding:16px;border-radius:var(--radius-lg);border:2px solid var(--border);background:var(--bg);cursor:pointer;text-align:center;width:100%;transition:border-color .15s}
.home-btn:hover{background:var(--bg)}.home-btn.primary{border-color:var(--red)}
.home-btn h3{font-size:15px;font-weight:600;margin-bottom:3px}.home-btn.primary h3{color:var(--red)}
.home-btn p{font-size:12px;color:var(--text2);margin:0}
.quick-links{display:grid;grid-template-columns:1fr 1fr;gap:10px;border-top:1px solid var(--border);padding-top:18px}
.quick-link{display:block;padding:12px;border-radius:var(--radius);border:1px solid var(--border);text-align:center;font-size:13px;font-weight:600;color:var(--text);text-decoration:none;background:var(--bg)}
.quick-link:hover{background:var(--bg2)}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat-card{background:var(--bg2);border-radius:var(--radius);padding:10px 12px}
.stat-label{font-size:10px;color:var(--text2);margin-bottom:3px;letter-spacing:.05em}
.stat-value{font-size:21px;font-weight:600;line-height:1}
.dash-toolbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap}
.dash-actions{display:flex;gap:6px;flex-wrap:wrap}
.tab-bar{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;width:100%;margin-bottom:16px}
.tab-btn{flex:1;padding:8px;font-size:13px;background:transparent;border:none;border-right:1px solid var(--border);color:var(--text2);cursor:pointer}
.tab-btn:last-child{border-right:none}.tab-btn.active{background:var(--bg2);color:var(--text);font-weight:600}
.bandiere-panel{background:var(--bg);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden}
.bandiere-header{padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.bandiere-header h3{font-size:14px;font-weight:600}
.bulk-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.bulk-controls label{margin:0;font-size:12px;color:var(--text2);white-space:nowrap}
.bulk-btn{font-size:12px;padding:5px 12px;background:var(--navy);color:white;border-color:var(--navy)}
.bulk-btn:hover{background:#142f70}
.station-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--border)}
.station-row:last-child{border-bottom:none}
.station-flag-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(0,0,0,.1)}
.station-name{flex:1;font-size:13px}.station-num{font-size:11px;color:var(--text3);margin-left:4px}
.flag-select{width:auto;padding:4px 8px;font-size:12px;flex-shrink:0}
.filters{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.reports-list{display:grid;gap:8px}
.report-card{border-radius:var(--radius-lg);padding:13px 15px;background:var(--bg);transition:opacity .2s}
.report-card.resolved{opacity:.5;border:1px solid var(--border)}
.report-card.emergenza{border:1px solid var(--danger-border)}
.report-card.pericolo{border:1px solid var(--warning-border)}
.report-top{display:flex;align-items:flex-start;gap:8px}
.report-body{flex:1;min-width:0}.report-meta{font-size:11px;color:var(--text2);margin-top:4px}
.report-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.action-btn{font-size:11px;padding:3px 9px;border-radius:var(--radius)}
.action-btn.wa{color:var(--success-text);font-weight:700;background:var(--success-bg);border-color:transparent}
.action-btn.resolve{color:var(--info-text);background:var(--info-bg);border-color:transparent}
.action-btn.del{color:var(--danger-text);background:var(--danger-bg);border-color:transparent}
.tag-public{font-size:10px;color:var(--text3);border:1px solid var(--border);padding:1px 5px;border-radius:4px}
.tag-resolved{font-size:11px;color:var(--success-text)}
.zone-filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:7px 12px;background:var(--bg2);border-radius:var(--radius)}
.form-wrap{max-width:480px}.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.photo-preview{margin-top:8px;max-width:100%;height:100px;object-fit:cover;border-radius:var(--radius);border:1px solid var(--border);display:block}
.photo-remove{font-size:11px;padding:2px 8px;margin-top:6px;color:var(--danger-text);background:var(--danger-bg);border-color:transparent}
.confirm-wrap{text-align:center;padding:40px 0}
.confirm-icon{width:52px;height:52px;border-radius:50%;background:var(--success-bg);color:var(--success-text);font-size:22px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#27ae60;display:inline-block;margin-left:5px;vertical-align:middle}
.sync-dot.off{background:#e74c3c}
.empty{text-align:center;color:var(--text3);padding:32px;font-size:13px}
@media(max-width:400px){.stats-grid{grid-template-columns:repeat(2,1fr)}}

.meteo-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:12px}
.meteo-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}
.meteo-head h3{font-size:12px;font-weight:700;color:var(--text3);margin:0;letter-spacing:.06em;text-transform:uppercase}
.meteo-updated{font-size:11px;color:var(--text3)}
/* Hero */
.mhero{border-radius:var(--radius-lg);padding:18px 16px;margin-bottom:12px;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden}
.mhero-flag{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;z-index:1;position:relative}
.mhero-body{flex:1;z-index:1;position:relative}
.mhero-name{font-size:28px;font-weight:900;line-height:1;margin-bottom:2px}
.mhero-desc{font-size:13px;font-weight:500;margin-bottom:5px;opacity:.9}
.mhero-time{font-size:11px;opacity:.6}
/* Stats */
.mgrid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.mgrid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.mstat{background:var(--bg2);border-radius:12px;padding:12px 10px;text-align:center}
.mstat .mi{font-size:22px;line-height:1;margin-bottom:5px}
.mstat .mk{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.mstat .mv{font-size:19px;font-weight:800;line-height:1;color:var(--text)}
.mstat .ms{font-size:11px;color:var(--text2);margin-top:3px}
/* Timeline scroll orizzontale */
.mscroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.mscroll::-webkit-scrollbar{display:none}
.mslot{flex:0 0 72px;background:var(--bg2);border-radius:12px;padding:10px 8px;text-align:center;border:1.5px solid transparent}
.mslot.amber{border-color:#F5C800;background:#fffde7}
.mslot.red{border-color:#e74c3c;background:#fff5f5}
.mslot .sh{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:5px}
.mslot .si{font-size:18px;line-height:1;margin-bottom:3px}
.mslot .sw{font-size:14px;font-weight:800}
.mslot .sd{font-size:10px;color:var(--text2);margin-top:3px;line-height:1.5}
/* Lista 24h */
.mlist{display:grid;gap:6px}
.mrow{background:var(--bg2);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;border-left:4px solid transparent}
.mrow .rh{font-size:12px;font-weight:700;color:var(--text3);min-width:38px}
.mrow .ri{font-size:20px;flex-shrink:0}
.mrow .rb{flex:1;min-width:0}
.mrow .rb .rw{font-size:13px;font-weight:600}
.mrow .rb .rs{font-size:11px;color:var(--text2);margin-top:2px}
.mrow .rf{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* Satellite */
.sat-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:12px}
.sat-tabs{display:flex;background:var(--bg2)}
.sat-tab{flex:1;padding:9px 2px;font-size:11px;font-weight:700;background:transparent;border:none;border-bottom:2.5px solid transparent;cursor:pointer;color:var(--text3);margin-bottom:-1px;transition:all .15s}
.sat-tab.active{color:var(--red);border-bottom-color:var(--red);background:var(--bg)}
.sat-body{border-top:1px solid var(--border)}
.sat-body iframe{width:100%;height:290px;border:none;display:block}
.sat-foot{padding:7px 12px;font-size:10px;color:var(--text3);display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border)}
@media(max-width:380px){.mgrid3{grid-template-columns:repeat(2,minmax(0,1fr))}}


.meteo-home-btn{
  display:block;width:100%;
  padding:18px 16px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#67d6ff 0%,#36b8f5 45%,#1697e6 100%);
  color:#fff;
  box-shadow:0 8px 20px rgba(22,151,230,.28);
  text-align:center;
  margin-top:10px;
  margin-bottom:24px;
}
.meteo-home-btn:hover{background:linear-gradient(135deg,#67d6ff 0%,#36b8f5 45%,#1697e6 100%)}
.meteo-home-btn h3{
  display:flex;align-items:center;justify-content:center;gap:10px;
  color:#fff !important;
  margin:0 0 4px 0;
  font-size:16px;font-weight:700;
}
.meteo-home-btn p{
  color:rgba(255,255,255,.92) !important;
  margin:0;text-align:center;
  font-size:12px;
}
.meteo-home-icons{
  display:inline-flex;align-items:center;gap:6px;
  font-size:18px;line-height:1;
}


.forecast-intro{
  background:linear-gradient(135deg,rgba(26,59,140,.08),rgba(214,43,31,.06));
  border:1px solid rgba(26,59,140,.12);
  border-radius:16px;
  padding:14px 15px;
  margin-bottom:12px;
}
.forecast-intro-top{
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
}
.forecast-intro h2{
  font-size:22px;font-weight:900;color:var(--navy);margin:0 0 4px;
}
.forecast-intro p{
  font-size:12px;color:var(--text2);margin:0;
}
.forecast-chip-row{
  display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;
}
.forecast-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 10px;border-radius:999px;
  background:rgba(255,255,255,.75);
  border:1px solid rgba(26,59,140,.08);
  font-size:11px;font-weight:700;color:var(--text2);
}
.forecast-section-title{
  display:flex;align-items:center;justify-content:space-between;
  margin:2px 0 10px;
}
.forecast-section-title h3{
  font-size:13px;font-weight:800;color:var(--text3);
  letter-spacing:.06em;text-transform:uppercase;margin:0;
}
.forecast-credit{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px 12px;
  margin:6px 0 16px;
  font-size:11px;
  color:var(--text3);
  text-align:center;
}
.forecast-credit a{color:var(--info-text);font-weight:700;text-decoration:none}
.consigli-home-btn{
  display:block;width:100%;
  padding:18px 16px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#ffd06b 0%,#ffb830 45%,#f5922d 100%);
  color:#fff;
  box-shadow:0 8px 20px rgba(245,146,45,.28);
  text-align:center;
  margin-bottom:24px;
  cursor:pointer;
}
.consigli-home-btn:hover{background:linear-gradient(135deg,#ffd06b 0%,#ffb830 45%,#f5922d 100%)}
.consigli-home-btn h3{
  display:flex;align-items:center;justify-content:center;gap:10px;
  color:#fff !important;
  margin:0 0 4px 0;
  font-size:16px;font-weight:700;
}
.partner-home-btn{
  display:block;width:100%;
  padding:12px 16px;
  border:1px solid var(--border);
  border-radius:12px;
  background:var(--bg);
  color:var(--text);
  text-align:center;
  margin-bottom:14px;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
  color:var(--text2);
}
.partner-home-btn:hover{background:var(--bg2)}
.partner-section-title{
  font-size:10px;font-weight:700;color:#999;
  letter-spacing:.07em;text-transform:uppercase;
  margin:20px 0 12px;
}
.partner-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:12px;margin-bottom:8px;
}
.partner-card{
  background:#fff!important;border:1px solid #e0e0e0;
  border-radius:12px;padding:16px 12px;
  display:flex;align-items:center;justify-content:center;
  min-height:70px;
}
.partner-card img{max-width:100%;max-height:60px;object-fit:contain;display:block}
.partner-card.wide{grid-column:span 2}
.consigli-home-btn p{
  color:rgba(255,255,255,.92) !important;
  margin:0;
  font-size:12px;text-align:center;
}
.ordinanze-home-btn{
  display:block;width:100%;
  padding:18px 16px;
  border:none;

var _fbOnline=false;
function _lsGet(k){try{return JSON.parse(localStorage.getItem("fb_"+k)||"null");}catch(e){return null;}}
function _lsSet(k,v){try{localStorage.setItem("fb_"+k,JSON.stringify(v));}catch(e){}}

function _fbFetch(path,method,body){
  var opts={method:method||"GET",headers:{"Content-Type":"application/json"}};
  if(body!==undefined)opts.body=JSON.stringify(body);
  return fetch(FB_URL+"/"+path+".json",opts)
    .then(function(r){if(!r.ok)throw new Error(r.status);_fbOnline=true;return r.json();});
}
var firebaseSdk = window.firebase;
var firebase={
  _db:{
    ref:function(path){
      return {
        _path:path,
        on:function(evt,cb,pollInterval){
          var self=this;
          var lsKey=self._path;
          // Intervalli differenziati per path (ms)
          var _POLL_MAP={"flags":5000,"reports":10000,"stationNotes":15000};
          var _pi=pollInterval||_POLL_MAP[lsKey]||10000;
          // Avvia subito con dati locali
          var local=_lsGet(lsKey);
          if(local!==null)cb({val:function(){return local;}});
          // Poi tenta Firebase in background
          function poll(){
            _fbFetch(self._path)
              .then(function(data){
                _lsSet(lsKey,data);
                cb({val:function(){return data;}});
              })
              .catch(function(){/* silenzioso - usa localStorage */});
          }
          poll();
          setTimeout(poll,1500); // secondo tentativo rapido
          setInterval(poll,_pi);
        },
        push:function(data){
          var lsKey=this._path;
          // Salva sempre in locale
          var arr=_lsGet(lsKey)||{};
          var tempKey="local_"+Date.now();
          arr[tempKey]=data;
          _lsSet(lsKey,arr);
          // Tenta Firebase
          return _fbFetch(lsKey,"POST",data)
            .then(function(d){return {key:d.name};})
            .catch(function(){return {key:tempKey};});
        },
        set:function(data){
          _lsSet(this._path,data);
          return _fbFetch(this._path,"PUT",data).catch(function(){return null;});
        },
        update:function(data){
          var cur=_lsGet(this._path)||{};
          Object.assign(cur,data);
          _lsSet(this._path,cur);
          return _fbFetch(this._path,"PATCH",data).catch(function(){return null;});
        },
        remove:function(){
          _lsSet(this._path,null);
          return _fbFetch(this._path,"DELETE").catch(function(){return null;});
        },
        child:function(sub){return firebase._db.ref(this._path+"/"+sub);}
      };
    }
  },
  database:function(){return firebase._db;}
};

async function enableOperatorPush(){
  if (!("serviceWorker" in navigator) || !("Notification" in window)) {
    console.log("Push non supportate");
    return;
  }

  if (!_fcmApp){
    _fcmApp = firebaseSdk.initializeApp(firebaseConfig, "fcmApp");
  }

  if (!_fcmMessaging){
    _fcmMessaging = firebaseSdk.messaging(_fcmApp);
  }

  let permission = Notification.permission;
  if (permission !== "granted"){
    permission = await Notification.requestPermission();
  }

  if (permission !== "granted"){
    console.log("Permesso negato");
    return;
  }

  const registration = await navigator.serviceWorker.register(
    "/appsegnalazioni/firebase-messaging-sw.js",
    { scope: "/appsegnalazioni/" }
  );

  const token = await _fcmMessaging.getToken({
    vapidKey: FCM_VAPID_KEY,
    serviceWorkerRegistration: registration
  });

  if (!token){
    console.log("Token non ottenuto");
    return;
  }

  _fcmToken = token;
  localStorage.setItem("omnia_fcm_token", token);

  const tokenKey = _safeTokenKey(token);

  await _fbFetch("operatorTokens/" + tokenKey, "PUT", {
    token: token,
    enabled: true,
    role: "operator",
    lastSeen: Date.now()
  });

  console.log("✅ PUSH ATTIVO");
}

async function disableOperatorPush(){
  try{
    if(!_fcmToken){
      const savedToken = localStorage.getItem("omnia_fcm_token");
      if(savedToken) _fcmToken = savedToken;
    }

    if(!_fcmToken) return;

    const tokenKey = _safeTokenKey(_fcmToken);

    await _fbFetch("operatorTokens/" + tokenKey + "/enabled", "PUT", false);
    await _fbFetch("operatorTokens/" + tokenKey + "/lastDisabled", "PUT", Date.now());

    console.log("🔕 PUSH DISATTIVATO");
  }catch(e){
    console.log("Errore disableOperatorPush", e);
  }
}

function knotsFromKmh(v){return Math.round((Number(v||0))*0.539957);}
function degToCompass(deg){
  if(deg===undefined||deg===null||isNaN(deg)) return "-";
  const dirs=["N","NE","E","SE","S","SO","O","NO"];
  return dirs[Math.round((((deg%360)+360)%360)/45)%8];
}
function getRiskFromMeteo(m){
  if(!m) return {level:"n/d",flag:"verde",text:"Dati non disponibili"};
  const wave=Number(m.wave_height||0);
  const windKn=knotsFromKmh(m.wind_speed_10m||0);
  const gustKn=knotsFromKmh(m.wind_gusts_10m||0);
  const weatherCode=Number(m.weather_code||0);
  const thunder=[95,96,99].includes(weatherCode);
  if(thunder || wave>=1.2 || windKn>=22 || gustKn>=28) return {level:"alto",flag:"rossa",text:"Condizioni critiche o potenzialmente pericolose"};
  if(wave>=0.6 || windKn>=12 || gustKn>=18) return {level:"medio",flag:"gialla",text:"Mare mosso o vento sostenuto: attenzione"};
  return {level:"basso",flag:"verde",text:"Condizioni generalmente favorevoli"};
}
function fmtHour(iso){
  try{return new Date(iso).toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"});}catch(e){return "--:--";}
}
async function fetchMeteoMarine(force){
  const now=Date.now();
  if(meteoLoading) return;
  if(!force && meteoData && (now-meteoLastFetch)<20*60*1000) return;
  meteoLoading=true; meteoError="";
  
  try{
    const forecastUrl = "https://api.open-meteo.com/v1/forecast?latitude="+METEO_POINT.lat+"&longitude="+METEO_POINT.lng+"&current=temperature_2m,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,precipitation&hourly=temperature_2m,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,precipitation&timezone=auto&forecast_days=3";
    const marineUrl = "https://marine-api.open-meteo.com/v1/marine?latitude="+METEO_POINT.lat+"&longitude="+METEO_POINT.lng+"&current=wave_height,wave_direction,wave_period,sea_surface_temperature&hourly=wave_height,wave_direction,wave_period,sea_surface_temperature&timezone=auto&forecast_days=2&cell_selection=sea";
    const [forecastRes, marineRes] = await Promise.all([fetch(forecastUrl), fetch(marineUrl)]);
    if(!forecastRes.ok) throw new Error("Forecast HTTP "+forecastRes.status);
    if(!marineRes.ok) throw new Error("Marine HTTP "+marineRes.status);
    const forecast = await forecastRes.json();
    const marine = await marineRes.json();
    const current = Object.assign({}, forecast.current||{}, marine.current||{});
    const times = (forecast.hourly&&forecast.hourly.time)||[];
    const marineTimes = (marine.hourly&&marine.hourly.time)||[];
    const hourly = [];
    const startIdx = times.findIndex(function(t){
      const d = new Date(t).getTime();
      return d >= now-60*60*1000;
    });
    const from = startIdx>=0 ? startIdx : 0;
    for(let i=from;i<Math.min(from+72,times.length);i++){
      const mt = marineTimes.indexOf(times[i]);
      hourly.push({
        time: times[i],
        weather_code: forecast.hourly.weather_code ? forecast.hourly.weather_code[i] : null,
        wind_speed_10m: forecast.hourly.wind_speed_10m ? forecast.hourly.wind_speed_10m[i] : null,
        wind_direction_10m: forecast.hourly.wind_direction_10m ? forecast.hourly.wind_direction_10m[i] : null,
        wind_gusts_10m: forecast.hourly.wind_gusts_10m ? forecast.hourly.wind_gusts_10m[i] : null,
        precipitation: forecast.hourly.precipitation ? forecast.hourly.precipitation[i] : null,
        wave_height: mt>=0 && marine.hourly.wave_height ? marine.hourly.wave_height[mt] : null,
        wave_direction: mt>=0 && marine.hourly.wave_direction ? marine.hourly.wave_direction[mt] : null,
        sea_surface_temperature: mt>=0 && marine.hourly.sea_surface_temperature ? marine.hourly.sea_surface_temperature[mt] : null
      });
    }
    meteoData = {
      current: current,
      hourly: hourly,
      risk: getRiskFromMeteo(current),
      updatedAt: new Date().toISOString()
    };
    meteoLastFetch = Date.now();
  }catch(err){
    meteoError = "Dati meteomarini non disponibili";
  }finally{
    meteoLoading=false;
    
  }
}
function wIcon(kmh){

  const n=Math.round((kmh||0)*0.54);
  if(n<4)return"🌀";if(n<11)return"🍃";if(n<17)return"💨";if(n<22)return"🌬️";if(n<34)return"⛵";return"⚡";
}
function wmoIcon(code){
  if(code==null)return"🌤️";
  if(code<=1)return"☀️";if(code<=3)return"⛅";if(code<=49)return"🌫️";
  if(code<=67)return"🌧️";if(code<=77)return"❄️";if(code<=82)return"🌦️";
  if(code<=86)return"🌨️";return"⛈️";
}

      '<div class="mstat"><div class="mi">💧</div><div class="mk">Pioggia</div><div class="mv">'+(cur.precipitation!=null?Number(cur.precipitation).toFixed(1):"-")+'<small style="font-size:11px;font-weight:500"> mm</small></div><div class="ms">ultima ora</div></div>'+
      '<div class="mstat"><div class="mi">↗️</div><div class="mk">Dir. onda</div><div class="mv" style="font-size:16px">'+degToCompass(cur.wave_direction)+'</div><div class="ms">'+(cur.wave_direction!=null?Math.round(cur.wave_direction)+"°":"-")+'</div></div>'+
    '</div>';
  page.appendChild(grid);

  // Grafico barre onda + vento (Canvas)
  if(m.hourly&&m.hourly.length){
    const chartCard=document.createElement("div");chartCard.className="meteo-card";
    chartCard.innerHTML='<div class="meteo-head"><h3>📈 Prossime 12 ore</h3><div style="display:flex;align-items:center;gap:12px;font-size:10px;color:var(--text3)"><span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#1697e6;margin-right:3px;vertical-align:middle"></span>Onda (m)</span><span><span style="display:inline-block;width:10px;height:3px;background:#F5C800;margin-right:3px;vertical-align:middle"></span>Vento (nd)</span></div></div>';
    const canvas=document.createElement("canvas");
    canvas.height=110;
    canvas.style.cssText="width:100%;display:block";
    chartCard.appendChild(canvas);
    page.appendChild(chartCard);

    // Disegna grafico dopo mount
    setTimeout(function(){
      canvas.width=canvas.offsetWidth||canvas.parentElement.offsetWidth||320;
      const W=canvas.width, H=canvas.height;
      const ctx=canvas.getContext("2d");
      const hrs=m.hourly.slice(0,12);
      const PAD={t:10,r:8,b:28,l:36};
      const gW=W-PAD.l-PAD.r, gH=H-PAD.t-PAD.b;

      // Scala onda (barre)
      const waves=hrs.map(function(h){return h.wave_height!=null?Number(h.wave_height):0;});
      const winds=hrs.map(function(h){return knotsFromKmh(h.wind_speed_10m);});
      const maxWave=Math.max.apply(null,waves.concat([0.5]));
      const maxWind=Math.max.apply(null,winds.concat([5]));

      const barW=gW/hrs.length;

      // Griglia orizzontale
      ctx.strokeStyle="rgba(0,0,0,.06)";ctx.lineWidth=1;
      [0.25,0.5,0.75,1].forEach(function(f){
        const y=PAD.t+gH*(1-f);
        ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(PAD.l+gW,y);ctx.stroke();
      });

      // Barre onda
      hrs.forEach(function(h,i){
        const wv=h.wave_height!=null?Number(h.wave_height):0;
        const x=PAD.l+i*barW+barW*0.12;
        const bw=barW*0.52;
        const bh=(wv/maxWave)*gH;
        const y=PAD.t+gH-bh;
        // Colore barra per rischio
        const wnd=knotsFromKmh(h.wind_speed_10m);
        var col= (wv>2||wnd>25)?"#e74c3c":(wv>1||wnd>15)?"#F5C800":"#1697e6";
        ctx.fillStyle=col+"cc";
        // Arrotondamento sopra
        const r=Math.min(4,bw/2,bh);
        ctx.beginPath();
        ctx.moveTo(x+r,y);
        ctx.lineTo(x+bw-r,y);
        ctx.quadraticCurveTo(x+bw,y,x+bw,y+r);
        ctx.lineTo(x+bw,y+bh);
        ctx.lineTo(x,y+bh);
        ctx.lineTo(x,y+r);
        ctx.quadraticCurveTo(x,y,x+r,y);
        ctx.closePath();
        ctx.fill();
      });

      // Linea vento (sopra le barre)
      ctx.strokeStyle="#F5C800";ctx.lineWidth=2.5;ctx.lineJoin="round";
      ctx.beginPath();
      hrs.forEach(function(h,i){
        const wnd=knotsFromKmh(h.wind_speed_10m);
        const cx=PAD.l+i*barW+barW*0.5;
        const cy=PAD.t+gH-(wnd/maxWind)*gH*0.9;
        if(i===0) ctx.moveTo(cx,cy); else ctx.lineTo(cx,cy);
      });
      ctx.stroke();
      // Punti linea vento
      hrs.forEach(function(h,i){
        const wnd=knotsFromKmh(h.wind_speed_10m);
        const cx=PAD.l+i*barW+barW*0.5;
        const cy=PAD.t+gH-(wnd/maxWind)*gH*0.9;
        ctx.fillStyle="#F5C800";
        ctx.beginPath();ctx.arc(cx,cy,3,0,Math.PI*2);ctx.fill();
      });

      // Asse Y onda (sinistra)
      ctx.fillStyle="rgba(0,0,0,.35)";ctx.font="10px sans-serif";ctx.textAlign="right";
      [0,maxWave*0.5,maxWave].forEach(function(v){
        const y=PAD.t+gH-(v/maxWave)*gH;
        ctx.fillText(v.toFixed(1)+"m",PAD.l-4,y+3);
      });

      // Etichette ore (basso)
      ctx.fillStyle="rgba(0,0,0,.4)";ctx.textAlign="center";ctx.font="9px sans-serif";
      hrs.forEach(function(h,i){
        if(i%2!==0)return; // ogni 2 ore
        const cx=PAD.l+i*barW+barW*0.5;
        ctx.fillText(fmtHour(h.time),cx,H-6);
      });
    },60);
  }
}

function resizeImg(file,cb){

function haversine(lat1,lng1,lat2,lng2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function findNearest(lat,lng){
  let best=null,bestDist=Infinity;
  STATIONS.forEach(s=>{const d=haversine(lat,lng,s.lat,s.lng);if(d<bestDist){bestDist=d;best=s;}});
  return{station:best,dist:Math.round(bestDist)};
}
function findNearestDAE(lat,lng){
  var best=null,bestDist=Infinity;
  DAE_POINTS.forEach(function(d){
    var dist=haversine(lat,lng,d.lat,d.lng);
    if(dist<bestDist){bestDist=dist;best=d;}
  });
  return{dae:best,dist:Math.round(bestDist)};
}

function playBeep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [880,1100].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;g.gain.value=0.25;
      o.start(ctx.currentTime+i*0.22);o.stop(ctx.currentTime+i*0.22+0.15);
    });
  }catch(e){}
}

function _playAlertTone(type){
  try{
    if(!_alertCtx)_alertCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(_alertCtx.state==="suspended")_alertCtx.resume();
    var freqs=type==="emergenza"?[880,1320,880,660]:[660,880,660];
    freqs.forEach(function(f,i){
      var o=_alertCtx.createOscillator(),g=_alertCtx.createGain();
      o.connect(g);g.connect(_alertCtx.destination);
      o.frequency.value=f;o.type=type==="emergenza"?"square":"triangle";
      g.gain.setValueAtTime(0.35,_alertCtx.currentTime+i*0.18);
      g.gain.exponentialRampToValueAtTime(0.001,_alertCtx.currentTime+i*0.18+0.15);
      o.start(_alertCtx.currentTime+i*0.18);o.stop(_alertCtx.currentTime+i*0.18+0.16);
    });
  }catch(e){}
}

  if(_alertCtx&&_alertCtx.state==="suspended")_alertCtx.resume().then(function(){_playAlertTone(type);});

    if(_alertCtx&&_alertCtx.state==="suspended")_alertCtx.resume().then(function(){_playAlertTone(type);});
    else _playAlertTone(type);

  var banner=document.createElement("div");
  banner.className="alert-banner "+type;banner.id="_alertBanner";
  var icon=type==="emergenza"?"\uD83D\uDEA8":"\u26A0\uFE0F";

// GPS
function _onGPSPosition(pos){
  var lat=pos.coords.latitude,lng=pos.coords.longitude;
  _userLat=lat;_userLng=lng;_userGpsAcc=pos.coords.accuracy||null;
  var res=findNearest(lat,lng);
  nearestStation=res.station;nearestDist=res.dist;
  var daeResult=findNearestDAE(lat,lng);
  nearestDAE=daeResult.dae;nearestDAEDist=daeResult.dist;
  if(mapObj){
    if(userMarker){try{userMarker.setLatLng([lat,lng]);}catch(e){
      try{userMarker.remove();}catch(e2){}
      var icon=L.divIcon({className:"",html:'<div style="width:16px;height:16px;border-radius:50%;background:#1d4ed8;border:3px solid white;box-shadow:0 0 0 4px rgba(29,78,216,.3)"></div>',iconSize:[16,16],iconAnchor:[8,8]});
      userMarker=L.marker([lat,lng],{icon}).addTo(mapObj).bindPopup('<b>Sei qui</b>');
    }} else {
      var icon=L.divIcon({className:"",html:'<div style="width:16px;height:16px;border-radius:50%;background:#1d4ed8;border:3px solid white;box-shadow:0 0 0 4px rgba(29,78,216,.3)"></div>',iconSize:[16,16],iconAnchor:[8,8]});
      userMarker=L.marker([lat,lng],{icon}).addTo(mapObj).bindPopup('<b>Sei qui</b>');
      // Prima volta: centra la mappa sulla posizione + postazione vicina
      var bounds=L.latLngBounds([[lat,lng],[nearestStation.lat,nearestStation.lng]]);
      mapObj.fitBounds(bounds,{padding:[50,50],maxZoom:16});
    }
    // Aggiorna marcatore postazione più vicina (anello blu)
    refreshMarkers();
  }
  if(currentScreen==="home")renderPage();
}

function requestGPS(){
  if(!navigator.geolocation)return;
  // Se già in ascolto, non riavviare
  if(_gpsWatchId!==null)return;
  _gpsError=false;
  _gpsWatchId=navigator.geolocation.watchPosition(
    _onGPSPosition,
    function(e){
      // code 1=permesso negato, 2=non disponibile, 3=timeout
      if(e.code===3){
        // Timeout: segnale assente momentaneamente, riprova silenziosamente
        // _gpsWatchId rimane attivo, watchPosition riproverà da solo
        return;
      }
      nearestStation=null;
      _gpsError=true;
      if(currentScreen==="home")renderPage();
    },
    {enableHighAccuracy:true,timeout:30000,maximumAge:30000}
  );
}

// MAPPA
function initMap(){
  var el=document.getElementById("main-map");
  if(!el)return;
  if(mapObj){ensureLocamareMarker();refreshMarkers();mapObj.invalidateSize(true);return;}
  if(el._leaflet_id){try{if(el._leaflet&&el._leaflet.remove)el._leaflet.remove();}catch(e){}delete el._leaflet_id;delete el._leaflet;}
  el.style.width="100%";
  mapObj=L.map(el,{zoomControl:true,preferCanvas:true,updateWhenIdle:true,tap:true}).setView([42.686,14.010],13);
  L.tileLayer(
    "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
    {
      attribution:"",
      maxZoom:20,
      updateWhenIdle:true,
      keepBuffer:3
    }
  ).addTo(mapObj);
  // Layer etichette strade e nomi vie
  L.tileLayer(
    "https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}",
    {
      attribution:"",
      maxZoom:20,
      opacity:1,
      updateWhenIdle:true
    }
  ).addTo(mapObj);
  L.tileLayer(
    "https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",
    {
      attribution:"",
      maxZoom:20,
      opacity:1,
      updateWhenIdle:true
    }
  ).addTo(mapObj);
  ensureLocamareMarker();
  addCCMarker();
  addPLMarker();
  addFinanzaMarker();
  addVVFMarker();
  addGuardiaMedicaMarker();
  addComuneMarker();
  addIATMarker();
  addRosetanaMarker();
  addPortoroseMarker();
  addZoneVietate();
  addDAEMarkers();
  refreshMarkers();
  mapObj.whenReady(function(){
    [50,250,700].forEach(function(t){setTimeout(function(){if(mapObj)mapObj.invalidateSize(true);},t);});
  });
  // Quando si chiude un popup, aggiorna i marker se era in coda
  mapObj.on("popupclose",function(){
    if(_refreshPending){setTimeout(function(){refreshMarkers();},50);}
  });
  mapObj.on("load",function(){setTimeout(function(){if(mapObj)mapObj.invalidateSize(true);},150);});
}
function getMarkerColor(s){
  const open=Object.values(reportsData).filter(r=>r.status==="aperta");
  const zl=`P.${s.num} \u2013 ${s.name}`;
  const zr=open.filter(r=>r.zone===zl);
  const flagColor=FLAG_COLORS[flagsData[s.num]||"verde"];
  if(zr.some(r=>r.type==="emergenza"))return{bg:flagColor,ring:true,ringColor:ALERT_COLORS.emergenza};
  if(zr.some(r=>r.type==="pericolo"))return{bg:flagColor,ring:true,ringColor:ALERT_COLORS.pericolo};
  if(stationNotesData[String(s.num)])return{bg:flagColor,ring:true,ringColor:"#1a1a1a",note:stationNotesData[String(s.num)]};
  return{bg:flagColor,ring:false,flag:flagsData[s.num]||"verde"};
}
function refreshMarkers(){
  if(!mapObj)return;
  // Se un popup è aperto non distruggere i marker - aggiornali al momento della chiusura
  var _anyOpen=mapMarkers.some(function(m){try{return m.isPopupOpen();}catch(e){return false;}})
    ||daeMarkers.some(function(m){try{return m.isPopupOpen();}catch(e){return false;}});
  if(_anyOpen){_refreshPending=true;return;}
  _refreshPending=false;
  mapMarkers.forEach(function(m){try{m.remove();}catch(e){}});
  mapMarkers=[];
  const open=Object.values(reportsData).filter(r=>r.status==="aperta");
  STATIONS.forEach(s=>{
    const zl=`P.${s.num} \u2013 ${s.name}`;
    const zr=open.filter(r=>r.zone===zl);
    const mc=getMarkerColor(s);
    const isNearest=nearestStation&&nearestStation.num===s.num;
    const shadow=mc.ring?`box-shadow:0 0 0 3px ${mc.ringColor||mc.bg},0 0 0 5px white;`:`box-shadow:0 1px 4px rgba(0,0,0,.4);`;
    const nearRing=isNearest?`outline:3px solid #1d4ed8;outline-offset:2px;`:"";
    const icon=L.divIcon({className:"",
      html:`<div style="width:26px;height:26px;border-radius:50%;background:${mc.bg};border:2.5px solid white;color:white;font-size:8.5px;font-weight:700;line-height:21px;text-align:center;${shadow}${nearRing}">${s.num}</div>`,
      iconSize:[26,26],iconAnchor:[13,13]});
    // Popup con info postazione e distanza
    (function(station, zoneLabel, alerts, markerColor){
      var m=L.marker([station.lat,station.lng],{icon}).addTo(mapObj);
      m.on("click",function(){
        // Cerca posizione utente dal userMarker
        var userPos=null;
        if(userMarker){try{userPos=userMarker.getLatLng();}catch(e){}}
        var distStr="";
        if(userPos){
          var dm=Math.round(haversine(userPos.lat,userPos.lng,station.lat,station.lng));
          distStr="<br><span style=\"color:#555;font-size:12px\">\uD83D\uDCCD "+fmtDist(dm)+" da te</span>";
        } else if(nearestStation&&nearestStation.num===station.num&&nearestDist){
          distStr="<br><span style=\"color:#555;font-size:12px\">\uD83D\uDCCD "+fmtDist(nearestDist)+" da te</span>";
        }
        // Colore bandiera
        var flagName=flagsData[station.num]||"verde";
        var flagCol=FLAG_COLORS[flagName];
        var flagStr="<br><span style=\"font-size:12px\">Bandiera <span style=\"font-weight:700;color:"+flagCol+"\">"+flagName.toUpperCase()+"</span></span>";
        // Alert aperti
        var alertStr=alerts.length>0?"<br><span style=\"color:"+markerColor+";font-size:12px\">"+alerts.length+" segnalaz. aperte</span>":"";
        var noteStr="";
        if(stationNotesData[String(station.num)]){
          noteStr='<div style="margin:6px 0;padding:7px 10px;background:#1a1a1a;border-radius:6px;color:white;font-size:12px;line-height:1.4">'
            +'<span style="font-weight:700;display:block;margin-bottom:2px">\u26a0\ufe0f Nota operatore</span>'
            +String(stationNotesData[String(station.num)]).replace(/</g,"&lt;").replace(/>/g,"&gt;")+"</div>";
        }
        var popup=L.popup({maxWidth:220,keepInView:true,autoPanPadding:[20,20]})
          .setContent(
            "<div style=\"font-family:sans-serif;padding:2px\">"
            +"<b style=\"font-size:14px\">P."+station.num+" \u2013 "+station.name+"</b>"
            +noteStr+distStr+flagStr+alertStr
            +"<br><button onclick=\"window._segnalaPostazione('"+zoneLabel+"')\" "
            +"style=\"margin-top:8px;width:100%;padding:7px;background:#D62B1F;color:white;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer\">"
            +"\uD83D\uDEA8 Segnala qui</button>"
            +"</div>"
          );
        m.bindPopup(popup).openPopup();
      });
      mapMarkers.push(m);
    })(s, zl, zr, mc.bg);
  });
  // Aggiorna anche i marker DAE (evidenzia il più vicino)
  addDAEMarkers();
}

function addDAEMarkers(){
  if(!mapObj)return;
  daeMarkers.forEach(function(m){try{m.remove();}catch(e){}});
  daeMarkers=[];
  DAE_POINTS.forEach(function(d){
    var isNear=nearestDAE&&nearestDAE.name===d.name;
    var nearStyle=isNear?"outline:3px solid #1d4ed8;outline-offset:3px;border-radius:6px;":"";
    var daeIcon=L.divIcon({
      className:"",
      html:'<div style="width:22px;height:22px;border-radius:4px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.5);border:1.5px solid #fff;'+nearStyle+'">'
          +'<img src="data:image/jpeg;base64,'+DAE_B64+'" style="width:100%;height:100%;object-fit:cover;display:block;"/></div>',
      iconSize:[22,22],iconAnchor:[11,11],popupAnchor:[0,-13]

    var availHtml=d.avail?'<div style="font-size:11px;font-weight:600;color:#555;margin-bottom:8px">'+d.avail+'</div>':'';
    var popHtml=
      '<div style="font-family:sans-serif;min-width:180px">'
      +'<div style="font-size:13px;font-weight:700;color:#1a6b1a;margin-bottom:6px">'
      +'\u2764\ufe0f\u200d\ud83e\ude79 '+d.name+'</div>'
      +'<div style="font-size:12px;color:#333;margin-bottom:4px">Defibrillatore DAE disponibile</div>'
      +availHtml
      +'<a href="https://www.google.com/maps/dir/?api=1&destination='+d.lat+','+d.lng+'&travelmode=walking"'
      +' target="_blank" style="display:block;text-align:center;background:#1a6b1a;color:#fff;text-decoration:none;padding:7px 10px;border-radius:7px;font-size:12px;font-weight:700">\ud83e\uddad Indicazioni</a>'
      +'</div>';
    m.bindPopup(popHtml);
    daeMarkers.push(m);
  });
  addBoeCantiereMarkers();
}

    var popHtml='<div style="font-family:sans-serif;min-width:210px;line-height:1.5">'

      +'<div style="font-size:11px;font-weight:700;color:#333;margin-bottom:2px">Ordinanza N. 23/2026</div>'
      +'<div style="font-size:11px;color:#555;margin-bottom:2px">Ufficio Circondariale Marittimo di Giulianova</div>'
      +'<div style="font-size:11px;color:#333;margin-bottom:2px"><strong>'+b.area+'</strong> — Segnalamento '+b.pres+'</div>'
      +'<div style="font-size:11px;color:#333;margin-bottom:2px">BOA '+b.boa+' — Boa ad asta gialla con miraglio X</div>'
      +'<div style="font-size:10px;color:#888;margin-bottom:6px">Divieto balneazione, navigazione e pesca nel raggio di 100 mt dai motopontoni</div>'
      +'<div style="font-size:10px;font-weight:700;color:#cc0000">Validità: prorogata fino al 03.06.2026 (Ord. 37/2026)</div>'

      title:'Consigli del Bagnino',

      color:'#006a8e'
    }
  ];

  var cur=0;

  // Overlay
  var overlay=document.createElement('div');
  overlay.id='_ob_overlay';
  overlay.style.cssText='position:fixed;inset:0;z-index:99999;background:linear-gradient(160deg,#0d3d7a 0%,#1a5fa8 60%,#0a2a55 100%);display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:0;overflow:hidden;touch-action:pan-y;';

  // Skip button
  var skipBtn=document.createElement('button');
  skipBtn.textContent='Salta';
  skipBtn.style.cssText='position:absolute;top:16px;right:16px;background:rgba(255,255,255,.18);border:none;color:#fff;font-size:13px;font-weight:600;padding:6px 14px;border-radius:20px;cursor:pointer;z-index:2;';
  overlay.appendChild(skipBtn);

  // Slides container
  var slidesWrap=document.createElement('div');
  slidesWrap.style.cssText='flex:1;display:flex;align-items:center;justify-content:center;width:100%;padding:16px 24px 0;box-sizing:border-box;';

  var slideEl=document.createElement('div');
  slideEl.style.cssText='display:flex;flex-direction:column;align-items:center;text-align:center;gap:16px;max-width:360px;width:100%;animation:_ob_fadein .35s ease;';

  function renderSlide(){
    var s=slides[cur];
    slideEl.innerHTML='';
    slideEl.style.animation='none';
    void slideEl.offsetWidth; // force reflow
    slideEl.style.animation='_ob_fadein .35s ease';

    var iconEl=document.createElement('div');
    iconEl.textContent=s.icon;
    iconEl.style.cssText='font-size:72px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.3));';

    var titleEl=document.createElement('h2');
    titleEl.textContent=s.title;
    titleEl.style.cssText='color:#fff;font-size:22px;font-weight:900;margin:0;line-height:1.25;';

    var textEl=document.createElement('p');
    textEl.style.cssText='color:rgba(255,255,255,.88);font-size:14px;line-height:1.6;margin:0;white-space:pre-line;';
    textEl.textContent=s.text;

    // Accent bar
    var bar=document.createElement('div');
    bar.style.cssText='width:48px;height:4px;border-radius:2px;background:'+s.color+';opacity:.8;';

    slideEl.appendChild(iconEl);
    slideEl.appendChild(bar);
    slideEl.appendChild(titleEl);
    slideEl.appendChild(textEl);
  }

  slidesWrap.appendChild(slideEl);
  overlay.appendChild(slidesWrap);

  // Bottom area: dots + button
  var bottom=document.createElement('div');
  bottom.style.cssText='width:100%;padding:20px 24px 36px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;gap:20px;';

  // Dots
  var dotsEl=document.createElement('div');
  dotsEl.style.cssText='display:flex;gap:8px;align-items:center;';

  function renderDots(){
    dotsEl.innerHTML='';
    slides.forEach(function(_,i){
      var d=document.createElement('div');
      d.style.cssText='border-radius:50%;transition:all .25s;cursor:pointer;'+(i===cur?'width:24px;height:8px;border-radius:4px;background:#fff;':'width:8px;height:8px;background:rgba(255,255,255,.35);');
      d.addEventListener('click',function(){ cur=i; renderSlide(); renderDots(); updateBtn(); });
      dotsEl.appendChild(d);
    });
  }

  // Button
  var nextBtn=document.createElement('button');
  nextBtn.style.cssText='width:100%;max-width:320px;padding:15px 0;background:#fff;color:#1a5fa8;border:none;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,.25);letter-spacing:.3px;';

  function updateBtn(){
    nextBtn.textContent=cur===slides.length-1?'Inizia →':'Avanti →';
  }

  function dismiss(){
    try{localStorage.setItem(OB_KEY,'1');}catch(e){}
    overlay.style.transition='opacity .4s';
    overlay.style.opacity='0';
    setTimeout(function(){ if(overlay.parentNode) overlay.parentNode.removeChild(overlay); },400);
  }

  nextBtn.addEventListener('click',function(){
    if(cur<slides.length-1){ cur++; renderSlide(); renderDots(); updateBtn(); }
    else { dismiss(); }
  });
  skipBtn.addEventListener('click', dismiss);

  // Swipe support
  var _sx=null;
  overlay.addEventListener('touchstart',function(e){ _sx=e.changedTouches[0].clientX; },{passive:true});
  overlay.addEventListener('touchend',function(e){
    if(_sx===null) return;
    var dx=e.changedTouches[0].clientX-_sx; _sx=null;
    if(Math.abs(dx)<40) return;
    if(dx<0 && cur<slides.length-1){ cur++; renderSlide(); renderDots(); updateBtn(); }
    else if(dx>0 && cur>0){ cur--; renderSlide(); renderDots(); updateBtn(); }
  },{passive:true});

  bottom.appendChild(dotsEl);
  bottom.appendChild(nextBtn);
  overlay.appendChild(bottom);

  // CSS animation
  if(!document.getElementById('_ob_style')){
    var st=document.createElement('style'); st.id='_ob_style';
    st.textContent='@keyframes _ob_fadein{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}';
    document.head.appendChild(st);
  }

  renderSlide(); renderDots(); updateBtn();
  document.body.appendChild(overlay);
}

function render(screen){
  currentScreen=screen;
  if(!suppressHistory){
    try{
      if(!history.state || history.state.screen!==screen){
        history.pushState({screen:screen},"","");
      }
    }catch(e){}
  }
  renderHeader();
  const mapEl=document.getElementById("main-map");
  const showMap=["home","dashboard","login"].includes(screen);
  mapEl.style.display=showMap?"block":"none";
  document.getElementById("map-legend").style.display=showMap?"flex":"none";
  if(showMap){
    if(!mapObj){initMap();}
    else{refreshMarkers();[200,600].forEach(function(t){setTimeout(function(){if(mapObj)mapObj.invalidateSize(true);},t);});}
    renderMapLegend();
    if(!nearestStation)requestGPS();
  } else if(screen==="forecast"){
    // Richiedi GPS anche nella pagina meteo per la bandiera della postazione
    if(!nearestStation)requestGPS();
  }
  renderPage();
}
function renderPage(){
  const page=document.getElementById("page");page.innerHTML="";
  if(currentScreen==="home")renderHome(page);
  else if(currentScreen==="login")renderLogin(page);
  else if(currentScreen==="submit")renderSubmit(page);
  else if(currentScreen==="done")renderDone(page);
  else if(currentScreen==="forecast")renderForecastPage(page);
  else if(currentScreen==="consigli")renderConsigliPage(page);
  else if(currentScreen==="ordinanze")renderOrdinanzePage(page);
  else if(currentScreen==="partner")renderPartnerPage(page);
  else if(currentScreen==="install")renderInstallPage(page);
  else if(currentScreen==="dashboard"){if(currentRole!=="operator"){render("login");return;}renderDashboard(page);}
}

  const emergencyBox=document.createElement("div");

  renderSatelliteCard(page);

    b.innerHTML="<div style='padding:24px;text-align:center;color:var(--text3)'>⏳ Caricamento previsioni...</div>";
    page.appendChild(b);return;
  }
  if(meteoError&&!meteoData){
    const b=document.createElement("div");b.className="meteo-card";
    b.innerHTML="<div style='padding:16px;text-align:center;color:var(--danger-text)'>⚠️ "+meteoError+"</div>";
    page.appendChild(b);return;
  }

  const sec1=document.createElement("div");
  sec1.className="forecast-section-title";
  sec1.innerHTML='<h3>Quadro generale</h3><span style="font-size:11px;color:var(--text3)">Sintesi immediata</span>';
  page.appendChild(sec1);

  // Dati attuali + striscia ore
  renderMeteoCard(page);

  if(meteoData&&meteoData.hourly&&meteoData.hourly.length>4)  if(meteoData&&meteoData.hourly&&meteoData.hourly.length>4){
    var sec2=document.createElement("div");
    sec2.className="forecast-section-title";
    sec2.innerHTML='<h3>Evoluzione della giornata</h3><span style="font-size:11px;color:var(--text3)">Previsioni ora per ora</span>';
    page.appendChild(sec2);

    // Funzione sky icon da weather_code WMO
    function skyIcon(code,hr){
      var night=hr<6||hr>=21;
      if(code==null||code<=1) return night?"🌙":"☀️";
      if(code<=2) return night?"🌑":"🌤️";
      if(code<=3) return "⛅";
      if(code<=48) return "🌫️";
      if(code<=55) return "🌦️";
      if(code<=65) return "🌧️";
      if(code<=75) return "❄️";
      if(code<=82) return "🌦️";
      if(code<=86) return "🌨️";
      return "⛈️";
    }
    // Raggruppa per giorno e fascia oraria
    var dayMap={};
    meteoData.hourly.forEach(function(h){
      var d=new Date(h.time);
      var dk=d.toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"});
      var hr=d.getHours();
      var slot=hr>=6&&hr<12?"mattina":hr>=12&&hr<18?"pomeriggio":hr>=18&&hr<24?"sera":"notte";
      if(!dayMap[dk])dayMap[dk]={mattina:[],pomeriggio:[],sera:[],notte:[]};
      dayMap[dk][slot].push(h);
    });
    function avgF(arr,field){
      var v=arr.map(function(h){return h[field];}).filter(function(x){return x!=null;});
      if(!v.length)return null;
      return v.reduce(function(a,b){return a+b;},0)/v.length;
    }
    function domDir(arr){
      var dirs=arr.map(function(h){return degToCompass(h.wind_direction_10m);}).filter(Boolean);
      if(!dirs.length)return"-";
      var f={};dirs.forEach(function(d){f[d]=(f[d]||0)+1;});
      return Object.keys(f).sort(function(a,b){return f[b]-f[a];})[0];
    }
    function domCode(arr){
      var codes=arr.map(function(h){return h.weather_code;}).filter(function(x){return x!=null;});
      if(!codes.length)return null;
      return Math.max.apply(null,codes);
    }
    var SLOT_META={
      mattina:{label:"Mattina",icon:"🌅",refHr:9,hours:"06–12"},
      pomeriggio:{label:"Pomeriggio",icon:"☀️",refHr:15,hours:"12–18"},
      sera:{label:"Sera",icon:"🌆",refHr:20,hours:"18–24"},
      notte:{label:"Notte",icon:"🌙",refHr:3,hours:"00–06"}
    };
    var SLOT_ORDER=["mattina","pomeriggio","sera","notte"];
    Object.keys(dayMap).forEach(function(dk,di){
      if(di>2)return; // max 3 giorni
      var slots=dayMap[dk];
      var filled=SLOT_ORDER.filter(function(s){return slots[s]&&slots[s].length>0;});
      if(!filled.length)return;
      // Card giorno
      var card=document.createElement("div");
      card.style.cssText="background:var(--bg);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px";
      // Header giorno
      var dHdr=document.createElement("div");
      dHdr.style.cssText="padding:11px 14px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px";
      dHdr.innerHTML='<div style="font-size:14px;font-weight:800;color:var(--navy);text-transform:capitalize">'+dk+'</div>';
      card.appendChild(dHdr);
      // Fasce
      filled.forEach(function(slotKey,si){
        var hrs=slots[slotKey];
        var meta=SLOT_META[slotKey];
        var avgWave=avgF(hrs,"wave_height");
        var avgWind=avgF(hrs,"wind_speed_10m");
        var avgGusts=avgF(hrs,"wind_gusts_10m");
        var avgSea=avgF(hrs,"sea_surface_temperature");
        var avgPrec=avgF(hrs,"precipitation");
        var dir=domDir(hrs);
        var code=domCode(hrs);
        var sky=skyIcon(code,meta.refHr);
        var wndNd=knotsFromKmh(avgWind);
        var gustNd=knotsFromKmh(avgGusts);
        var wv=avgWave!=null?Number(avgWave):0;
        var fl=wv>2||wndNd>25?"rossa":wv>1||wndNd>15?"gialla":"verde";
        var fc2=FLAG_COLORS[fl];
        var isGarb=(dir==="O"||dir==="SO"||dir==="NO");
        var hasRain=avgPrec!=null&&avgPrec>0.1;
        var row=document.createElement("div");
        row.style.cssText="display:grid;grid-template-columns:88px 1fr;"+(si>0?"border-top:1px solid var(--border)":"");
        // Colonna sx
        var lc=document.createElement("div");
        lc.style.cssText="padding:14px 10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:var(--bg2);border-right:1px solid var(--border)";
        lc.innerHTML=
          '<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">'+meta.label+'</div>'+
          '<div style="font-size:38px;line-height:1;margin:4px 0">'+sky+'</div>'+
          '<div style="font-size:10px;color:var(--text3)">'+meta.hours+'</div>';
        // Colonna dx
        var rc=document.createElement("div");
        rc.style.cssText="padding:12px 14px;display:flex;flex-direction:column;gap:7px";
        // Vento
        var windRow=document.createElement("div");
        windRow.style.cssText="display:flex;align-items:center;gap:6px;flex-wrap:wrap";
        windRow.innerHTML=
          '<span style="font-size:15px">💨</span>'+
          '<span style="font-size:17px;font-weight:800;color:var(--text)">'+wndNd+'</span>'+
          '<span style="font-size:12px;color:var(--text2)">nodi '+dir+'</span>'+
          (gustNd&&gustNd>wndNd?'<span style="font-size:11px;color:var(--text3)">· raffiche '+gustNd+' nd</span>':'')+
          (isGarb?'<span style="font-size:11px;font-weight:700;color:#92400e;background:#fef3c7;padding:2px 7px;border-radius:5px">⚠️ GARBINO</span>':'');
        // Mare
        var seaRow=document.createElement("div");
        seaRow.style.cssText="display:flex;align-items:center;gap:8px;flex-wrap:wrap";
        seaRow.innerHTML=
          '<span style="font-size:15px">🌊</span>'+
          '<span style="font-size:17px;font-weight:800;color:var(--text)">'+(avgWave!=null?Number(avgWave).toFixed(1):"-")+'</span>'+
          '<span style="font-size:12px;color:var(--text2)">m'+
          (avgSea!=null?' &nbsp;·&nbsp; 🌡️ '+Number(avgSea).toFixed(1)+'°C':'')+
          (hasRain?' &nbsp;·&nbsp; 💧 '+Number(avgPrec).toFixed(1)+'mm':'')+
          '</span>';
        // Bandiera
        rc.appendChild(windRow);
        rc.appendChild(seaRow);
        row.appendChild(lc);
        row.appendChild(rc);
        card.appendChild(row);
      });
      page.appendChild(card);
    });
  }
  const credit=document.createElement("div");
  credit.className="forecast-credit";
  credit.innerHTML='Dati previsionali: <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> · Mappe live: <a href="https://windy.com" target="_blank">Windy</a>';
  page.appendChild(credit);
}

function renderLogin(page){
  const back=document.createElement("button");back.className="back-btn";
  back.textContent="\u2190 Indietro";
  back.addEventListener("click",()=>render("home"));page.appendChild(back);

  const h=document.createElement("h2");
  h.style.cssText="font-size:18px;font-weight:600;margin-bottom:20px";
  h.textContent="Accesso operatori";page.appendChild(h);

  const lbE=document.createElement("label");lbE.textContent="Email";page.appendChild(lbE);
  const emailInp=document.createElement("input");emailInp.type="email";
  emailInp.placeholder="operatore@omnialifeguard.it";
  emailInp.autocomplete="email";page.appendChild(emailInp);

  const lbP=document.createElement("label");lbP.textContent="Password";page.appendChild(lbP);
  const passWrap=document.createElement("div");passWrap.style.cssText="position:relative";
  const passInp=document.createElement("input");passInp.type="password";
  passInp.placeholder="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022";
  passInp.autocomplete="current-password";
  passInp.style.paddingRight="44px";
  passWrap.appendChild(passInp);
  var eyeBtn=document.createElement("button");eyeBtn.type="button";
  eyeBtn.style.cssText="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:var(--text2);padding:4px";
  eyeBtn.textContent="\uD83D\uDC41\uFE0F";
  eyeBtn.addEventListener("click",function(){
    if(passInp.type==="password"){passInp.type="text";eyeBtn.textContent="\uD83D\uDEAB";}
    else{passInp.type="password";eyeBtn.textContent="\uD83D\uDC41\uFE0F";}
  });
  passWrap.appendChild(eyeBtn);
  page.appendChild(passWrap);

  const err=document.createElement("p");
  err.style.cssText="color:var(--danger-text);font-size:12px;margin:4px 0 10px;display:none";
  err.textContent="Email o password non corretti";page.appendChild(err);

  const btn=document.createElement("button");btn.className="btn-primary";
  btn.textContent="Accedi";

  async function go(){
    const email=emailInp.value.trim();
    const pass=passInp.value;
    if(!email||!pass){err.style.display="block";err.textContent="Inserisci email e password";return;}
    btn.disabled=true;btn.textContent="Accesso in corso...";err.style.display="none";
    try{
      var _a=_getAuth();if(!_a)throw new Error("Auth non disponibile");
      const cred=await _a.signInWithEmailAndPassword(email,pass);
      currentRole="operator";newReportCount=0;
      try{localStorage.setItem("omnia_op_auth","1");}catch(e){}
      if(window._requestNotifPermission)_requestNotifPermission();
      if(window.Notification&&Notification.permission==="default")Notification.requestPermission();
      render("dashboard");
    }catch(e){
      btn.disabled=false;btn.textContent="Accedi";
      err.style.display="block";
      var msg="Email o password non corretti";
      if(e.code==="auth/invalid-email")msg="Email non valida";
      else if(e.code==="auth/user-not-found")msg="Utente non trovato";
      else if(e.code==="auth/wrong-password"||e.code==="auth/invalid-credential")msg="Password errata";
      else if(e.code==="auth/too-many-requests")msg="Troppi tentativi, riprova tra qualche minuto";
      else if(e.code==="auth/network-request-failed")msg="Errore di rete, controlla la connessione";
      else if(e.code==="auth/unauthorized-domain")msg="Dominio non autorizzato — aggiungi il dominio in Firebase Console → Auth → Impostazioni";
      else if(e.code)msg="Errore: "+e.code;
      err.textContent=msg+(e.code?" ["+e.code+"]":"")+(e.message?" - "+e.message.substring(0,80):"");
      console.error("Firebase Auth error:",e.code,e.message);
    }
  }

  passInp.addEventListener("keydown",e=>{if(e.key==="Enter")go();});
  emailInp.addEventListener("keydown",e=>{if(e.key==="Enter")passInp.focus();});
  btn.addEventListener("click",go);page.appendChild(btn);

  // Auto-fill email if remembered
  try{const saved=localStorage.getItem("omnia_op_email");if(saved)emailInp.value=saved;}catch(e){}
}

    +'<p style="font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:8px">Ai sensi del Regolamento UE 2016/679 (GDPR), i dati personali forniti tramite questo servizio — inclusi numero di telefono, nome e, se il GPS del dispositivo è attivo e autorizzato, la posizione geografica al momento dell’invio — saranno trattati da Omnia Servizi al Turismo SRLS esclusivamente per la gestione della segnalazione, il coordinamento del soccorso, eventuali verifiche e il ricontatto dell’utente se necessario.</p>'

    +'<label style="display:flex;gap:8px;align-items:flex-start;font-size:12px;color:var(--text);margin:0"><input type="checkbox" id="privacyCheck" style="margin-top:2px;flex-shrink:0"> <span>Ho letto l’informativa privacy e acconsento al trattamento dei dati personali, inclusa l’eventuale posizione GPS, per la gestione della segnalazione.</span></label>';
  wrap.appendChild(privacyWrap);

  const emergencyNote=document.createElement("p");
  emergencyNote.style.cssText="font-size:11px;color:var(--danger-text);text-align:center;margin-top:10px";
  emergencyNote.textContent="Per emergenze contingenti contattare immediatamente il 112 o il servizio di salvataggio più vicino.";
  wrap.appendChild(emergencyNote);

  const submitBtn=document.createElement("button");submitBtn.className="btn-primary";submitBtn.style.marginTop="18px";submitBtn.textContent="Invia segnalazione";
  submitBtn.addEventListener("click",()=>{
    notes=notesEl.value;zone=zoneSel.value;author=authorEl.value;
    var phoneEl2=document.getElementById("segnalazione-phone");
    if(phoneEl2)phone=phoneEl2.value.trim();
    if(!sub){alert("Seleziona il tipo di segnalazione.");return;}
    if(currentRole!=="operator"&&phone.length<9){
      if(phoneEl2){phoneEl2.style.borderColor="var(--red)";phoneEl2.focus();}
      alert("Inserisci un numero di telefono valido per procedere.");return;
    }
    var privacyCheck=document.getElementById("privacyCheck");
    if(privacyCheck&&!privacyCheck.checked){
      alert("Devi leggere e accettare l’informativa privacy per procedere.");return;
    }
    submitBtn.disabled=true;submitBtn.textContent="Invio...";
    const r={id:Date.now(),type,sub,zone,notes,author,phone:phone||null,role:currentRole||"public",ts:new Date().toISOString(),status:"aperta",photo:photo||null,gps:(_userLat!==null)?{lat:_userLat,lng:_userLng,acc:_userGpsAcc}:null};
    addReport(r).then(()=>{sendWANotify(r);render("done");})
    .catch(e=>{submitBtn.disabled=false;submitBtn.textContent="Invia segnalazione";alert("Errore: "+e.message);});
  });
  wrap.appendChild(submitBtn);
  const wanote=document.createElement("p");wanote.style.cssText="font-size:11px;color:var(--text3);text-align:center;margin-top:10px";
  wanote.textContent="\uD83D\uDCAC Dopo l'invio si aprir\u00e0 WhatsApp per notificare gli operatori";
  wrap.appendChild(wanote);page.appendChild(wrap);
}

// DASHBOARD
function renderDashboard(page){
  const reports=getReports(),open=reports.filter(r=>r.status==="aperta");
  const tb=document.createElement("div");tb.className="dash-toolbar";
  const ti=document.createElement("div");
  const sd=fbReady?`<span class="sync-dot" title="Sync attivo"></span>`:`<span class="sync-dot off" title="Connessione..."></span>`;
  ti.innerHTML=`<h1 style="font-size:16px;font-weight:600;margin-bottom:2px">Dashboard Operatori ${sd}</h1><p style="font-size:11px;color:var(--text2)">Roseto degli Abruzzi &middot; P.10 \u2013 P.35</p>`;
  const logoutBtn=document.createElement("button");
  logoutBtn.style.cssText="font-size:12px;padding:5px 12px;color:var(--danger-text);background:var(--danger-bg);border-color:transparent;border-radius:var(--radius)";
  logoutBtn.innerHTML="\uD83D\uDD13 Esci";
  logoutBtn.addEventListener("click",function(){
    if(confirm("Vuoi uscire dall\u2019area operatori?")){
      currentRole=null;newReportCount=0;
      try{localStorage.removeItem("omnia_op_auth");}catch(e){}
      try{var _ao=_getAuth();if(_ao)_ao.signOut();}catch(e){}
      currentRole=null;
      render("home");
    }
  });
  ti.appendChild(logoutBtn);
  tb.appendChild(ti);
  const ac=document.createElement("div");ac.className="dash-actions";
  const newBtn=document.createElement("button");newBtn.className="btn-primary";newBtn.style.cssText="width:auto;font-size:12px;padding:6px 14px";newBtn.textContent="+ Segnala";
  newBtn.addEventListener("click",()=>render("submit"));ac.appendChild(newBtn);tb.appendChild(ac);page.appendChild(tb);
  const sg=document.createElement("div");sg.className="stats-grid";
  [{label:"APERTE",value:open.length,color:""},{label:"EMERGENZE",value:open.filter(r=>r.type==="emergenza").length,color:"var(--danger-text)"},
   {label:"PERICOLI",value:open.filter(r=>r.type==="pericolo").length,color:"var(--warning-text)"}]
  .forEach(s=>{const sc=document.createElement("div");sc.className="stat-card";sc.innerHTML=`<p class="stat-label">${s.label}</p><p class="stat-value"${s.color?` style="color:${s.color}"`:""}>${s.value}</p>`;sg.appendChild(sc);});
  page.appendChild(sg);
  const tabBar=document.createElement("div");tabBar.className="tab-bar";
  [["segnalazioni","Segnalazioni"],["bandiere","Bandiere"],["note","\u26a0\ufe0f Note"]].forEach(([k,l])=>{
    const btn=document.createElement("button");btn.className="tab-btn"+(activeDashTab===k?" active":"");btn.textContent=l;
    btn.addEventListener("click",()=>{activeDashTab=k;renderPage();});tabBar.appendChild(btn);
  });
  page.appendChild(tabBar);
  if(activeDashTab==="bandiere"){renderBandiere(page);return;}
  if(activeDashTab==="note"){renderNote(page);return;}
  if(activeStation){
    const bar=document.createElement("div");bar.className="zone-filter-bar";
    bar.innerHTML=`<span style="font-size:12px;flex:1;color:var(--text2)">Filtro: ${activeStation}</span>`;
    const clr=document.createElement("button");clr.style.cssText="font-size:11px;padding:2px 8px;color:var(--danger-text);background:var(--danger-bg);border-color:transparent";clr.textContent="\u2715 rimuovi";
    clr.addEventListener("click",()=>{activeStation=null;renderPage();});bar.appendChild(clr);page.appendChild(bar);
  }
  const ft=document.createElement("div");ft.className="filters";
  [["aperte","Aperte"],["emergenza","Emergenze"],["pericolo","Pericoli"],["tutte","Tutte"]].forEach(([k,l])=>{
    const b=document.createElement("button");b.className="filter-btn"+(activeFilter===k?" active":"");b.textContent=l;
    b.addEventListener("click",()=>{activeFilter=k;renderPage();});ft.appendChild(b);
  });
  page.appendChild(ft);
  let filtered=activeFilter==="tutte"?reports:activeFilter==="aperte"?open:reports.filter(r=>r.type===activeFilter);
  if(activeStation)filtered=filtered.filter(r=>r.zone===activeStation);
  if(!filtered.length){const em=document.createElement("p");em.className="empty";em.textContent="Nessuna segnalazione";page.appendChild(em);return;}
  const list=document.createElement("div");list.className="reports-list";
  filtered.forEach(r=>{
    const res=r.status==="risolta";
    const card=document.createElement("div");card.className=`report-card ${res?"resolved":r.type}`;
    const top=document.createElement("div");top.className="report-top";
    const body=document.createElement("div");body.className="report-body";
    const hr=document.createElement("div");hr.style.cssText="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px";
    const bdg=document.createElement("span");bdg.className=`badge badge-${r.type}`;bdg.textContent=TYPES[r.type].label.toUpperCase();hr.appendChild(bdg);
    const subEl=document.createElement("span");subEl.style.cssText="font-size:13px;font-weight:600";subEl.textContent=r.sub;hr.appendChild(subEl);
    if(res){const t=document.createElement("span");t.className="tag-resolved";t.textContent="\u2713 risolta";hr.appendChild(t);}
    if(r.role==="public"){const t=document.createElement("span");t.className="tag-public";t.textContent="pubblico";hr.appendChild(t);}
    body.appendChild(hr);
    const nt=document.createElement("p");nt.style.cssText="font-size:13px;line-height:1.5;margin-bottom:4px";nt.textContent=r.notes;body.appendChild(nt);
    if(r.photo){const imgWrap=document.createElement("div");imgWrap.style.cssText="position:relative;display:inline-block;margin:4px 0";const img=document.createElement("img");img.src=r.photo;img.style.cssText="max-width:100%;height:90px;object-fit:cover;border-radius:var(--radius);border:1px solid var(--border);display:block";const dlBtn=document.createElement("a");dlBtn.href=r.photo;dlBtn.download="segnalazione_"+r.id+".jpg";dlBtn.style.cssText="position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.65);color:white;border-radius:5px;padding:3px 7px;font-size:11px;font-weight:700;text-decoration:none";dlBtn.textContent="\u2B07\uFE0F";imgWrap.appendChild(img);imgWrap.appendChild(dlBtn);body.appendChild(imgWrap);}
    const mt=document.createElement("p");mt.className="report-meta";mt.textContent=`${r.zone} \u00b7 ${fmt(r.ts)}${r.author?" \u00b7 "+r.author:""}${r.phone?" \u00b7 \uD83D\uDCDE "+r.phone:""}`;body.appendChild(mt);
    top.appendChild(body);
    const acts=document.createElement("div");acts.className="report-actions";
    const wa=document.createElement("button");wa.className="action-btn wa";wa.textContent="WA";
    wa.addEventListener("click",()=>{
      const em={emergenza:"\uD83D\uDEA8",pericolo:"\u26A0\uFE0F"};
      const txt=`${em[r.type]} *${TYPES[r.type].label.toUpperCase()}* \u2014 ${r.sub}\n\uD83D\uDCCD ${r.zone}\n${r.notes}${r.author?"\n\uD83D\uDC64 "+r.author:""}${r.phone?"\n\uD83D\uDCDE "+r.phone:""}\n\uD83D\uDD50 ${fmt(r.ts)}\n\n\u2014 Omnia Adriatic Lifeguard Service`;
      window.open(`https://wa.me/${WA_NOTIFY}?text=${encodeURIComponent(txt)}`,"_blank");
    });acts.appendChild(wa);
    if(!res){
      const rv=document.createElement("button");rv.className="action-btn resolve";rv.textContent="\u2713";
      rv.addEventListener("click",()=>resolveReport(r._key).then(()=>refreshMarkers()));acts.appendChild(rv);
    }
    const dl=document.createElement("button");dl.className="action-btn del";dl.textContent="\u2715";
    dl.addEventListener("click",()=>{if(confirm("Eliminare questa segnalazione?")){deleteReport(r._key).then(()=>refreshMarkers());}});
    acts.appendChild(dl);top.appendChild(acts);card.appendChild(top);list.appendChild(card);
  });
  page.appendChild(list);
}

function renderNote(page){
  var panel=document.createElement("div");panel.className="bandiere-panel";
  panel.id="_notePanelRows";
  var hdr=document.createElement("div");hdr.className="bandiere-header";
  var title=document.createElement("h3");title.textContent="Note di pericolo postazioni";hdr.appendChild(title);
  var sub=document.createElement("p");sub.style.cssText="font-size:11px;color:var(--text2);margin:2px 0 0";
  sub.textContent="La postazione con nota diventa nera sulla mappa — visibile a tutti.";
  hdr.appendChild(sub);panel.appendChild(hdr);
  STATIONS.forEach(function(s){
    var row=document.createElement("div");
    row.style.cssText="padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px";
    var note=stationNotesData[String(s.num)];
    // Dot
    var dot=document.createElement("div");
    dot.id="_noteDot_"+s.num;
    dot.style.cssText="width:12px;height:12px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(0,0,0,.15);background:"+(note?"#1a1a1a":FLAG_COLORS[flagsData[s.num]||"verde"]);
    row.appendChild(dot);
    // Name + badge
    var nm=document.createElement("div");nm.style.cssText="flex:1;min-width:0";
    nm.innerHTML='<span style="font-size:13px">'+s.name+'</span> <span style="font-size:11px;color:var(--text3)">P.'+s.num+'</span>';
    var noteBadge=document.createElement("div");
    noteBadge.id="_noteBadge_"+s.num;
    noteBadge.style.cssText="font-size:11px;color:#fff;background:#1a1a1a;border-radius:4px;padding:2px 7px;margin-top:3px;display:"+(note?"inline-block":"none");
    noteBadge.textContent=note?String(note).substring(0,40)+(note.length>40?"...":""):"";
    nm.appendChild(noteBadge);
    row.appendChild(nm);
    // Add button
    var addBtn=document.createElement("button");
    addBtn.id="_noteAddBtn_"+s.num;
    addBtn.style.cssText="font-size:12px;padding:5px 10px;background:var(--bg2);border-color:var(--border2);flex-shrink:0;color:var(--text);display:"+(note?"none":"inline-block");
    addBtn.textContent="+ Nota";
    (function(sNum,sName,btn){
      btn.addEventListener("click",function(){_openNoteModal(sNum,sName,null);});
    })(s.num,s.name,addBtn);
    row.appendChild(addBtn);
    // Edit + delete buttons
    var editBtn=document.createElement("button");
    editBtn.style.cssText="font-size:12px;padding:5px 8px;background:var(--bg2);border-color:var(--border2);flex-shrink:0;color:var(--text);display:"+(note?"inline-block":"none");
    editBtn.textContent="\u270f\ufe0f";
    (function(sNum,sName){
      editBtn.addEventListener("click",function(){_openNoteModal(sNum,sName,stationNotesData[String(sNum)]);});
    })(s.num,s.name);
    row.appendChild(editBtn);
    var delBtn=document.createElement("button");
    delBtn.id="_noteDelBtn_"+s.num;
    delBtn.style.cssText="font-size:12px;padding:5px 10px;color:var(--danger-text);background:var(--danger-bg);border-color:transparent;flex-shrink:0;display:"+(note?"inline-block":"none");
    delBtn.textContent="\u2715";
    (function(sNum){
      delBtn.addEventListener("click",function(){
        if(confirm("Rimuovere la nota per P."+sNum+"?")){
          delete stationNotesData[String(sNum)]; // aggiorna locale immediatamente
          stationNotesRef.child(String(sNum)).remove(); // rimuovi SOLO questa nota
          try{var _sn=JSON.parse(localStorage.getItem("fb_stationNotes")||"{}");delete _sn[String(sNum)];localStorage.setItem("fb_stationNotes",JSON.stringify(_sn));}catch(e){}
          refreshMarkers();
          if(currentScreen==="home")renderPage();
          if(currentScreen==="dashboard"&&activeDashTab==="note")renderPage();
        }
      });
    })(s.num);
    row.appendChild(delBtn);
    panel.appendChild(row);
  });
  page.appendChild(panel);
}


// BANDIERE
function renderBandiere(page){
  const flags=getFlags();
  const panel=document.createElement("div");panel.className="bandiere-panel";
  const hdr=document.createElement("div");hdr.className="bandiere-header";
  const title=document.createElement("h3");title.textContent="Bandiere postazioni";hdr.appendChild(title);
  const bulk=document.createElement("div");bulk.className="bulk-controls";
  const bulkLbl=document.createElement("label");bulkLbl.textContent="Tutte:";bulk.appendChild(bulkLbl);
  const bulkSel=document.createElement("select");bulkSel.style.cssText="width:auto;padding:5px 8px;font-size:12px";
  [["verde","\uD83D\uDFE2 Verde"],["gialla","\uD83D\uDFE1 Gialla"],["rossa","\uD83D\uDD34 Rossa"]].forEach(([v,l])=>{
    const o=document.createElement("option");o.value=v;o.textContent=l;bulkSel.appendChild(o);
  });
  bulk.appendChild(bulkSel);
  const bulkBtn=document.createElement("button");bulkBtn.className="bulk-btn";bulkBtn.textContent="Applica a tutte";
  bulkBtn.addEventListener("click",()=>{
    const val=bulkSel.value,f={};STATIONS.forEach(s=>f[s.num]=val);saveFlags(f);
  });
  bulk.appendChild(bulkBtn);hdr.appendChild(bulk);panel.appendChild(hdr);
  STATIONS.forEach(s=>{
    const row=document.createElement("div");row.className="station-row";
    const dot=document.createElement("div");dot.className="station-flag-dot";dot.style.background=FLAG_COLORS[flags[s.num]||"verde"];row.appendChild(dot);
    const nm=document.createElement("div");nm.className="station-name";
    nm.innerHTML=`${s.name} <span class="station-num">P.${s.num}</span>`;row.appendChild(nm);
    const sel=document.createElement("select");sel.className="flag-select";
    [["verde","\uD83D\uDFE2 Verde"],["gialla","\uD83D\uDFE1 Gialla"],["rossa","\uD83D\uDD34 Rossa"]].forEach(([v,l])=>{
      const o=document.createElement("option");o.value=v;o.textContent=l;
      if((flags[s.num]||"verde")===v)o.selected=true;sel.appendChild(o);
    });
    sel.addEventListener("change",()=>{dot.style.background=FLAG_COLORS[sel.value];setFlag(s.num,sel.value);});
    row.appendChild(sel);panel.appendChild(row);
  });
  page.appendChild(panel);
}
